<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><title>Rogue Trail</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#eee;font-family:monospace;overflow:hidden;user-select:none;height:100vh;display:flex;flex-direction:column}
#ui-top{display:flex;align-items:center;gap:10px;padding:5px 10px;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0;flex-wrap:wrap}
.stat{font-size:12px;display:flex;align-items:center;gap:4px}
.stat label{color:#8b949e}
.bw{width:62px;height:7px;background:#21262d;border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px;transition:width .15s}
#hp-fill{background:#f85149}#xp-fill{background:#58a6ff}#cd-fill{background:#bc8cff}
.sv{color:#ffd700;font-weight:bold;font-size:12px}
#phase-badge{margin-left:auto;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:bold}
.pm{background:#0d2f1a;color:#3fb950;border:1px solid #3fb950}
.pb{background:#2f0d0d;color:#f85149;border:1px solid #f85149}
.pbo{background:#2f1a00;color:#ffd700;border:1px solid #ffd700}
.pbo2{background:#1a002f;color:#cc44ff;border:1px solid #cc44ff}
#main{flex:1;display:flex;overflow:hidden}
#sidebar{width:158px;background:#161b22;border-right:1px solid #30363d;display:flex;flex-direction:column;padding:7px;gap:4px;overflow-y:auto;flex-shrink:0}
#cw{flex:1;position:relative;display:flex;align-items:center;justify-content:center;background:#0d1117}
canvas{display:block;cursor:crosshair}
#log-panel{width:138px;background:#161b22;border-left:1px solid #30363d;padding:5px;overflow-y:auto;flex-shrink:0}
#log{font-size:10px;line-height:1.7}
.lc{color:#f85149}.li{color:#3fb950}.le{color:#e3b341}.lm{color:#8b949e}.lb{color:#ffd700}
.stt{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.wb{background:#21262d;border:1px solid #30363d;border-radius:4px;padding:4px 5px;font-size:10px;cursor:pointer;text-align:left;color:#eee;width:100%;margin-bottom:2px}
.wb:hover{background:#2d333b}.wb.active{border-color:#ffd700;background:#2a2200}
#combo-disp{position:absolute;top:12px;left:50%;transform:translateX(-50%);pointer-events:none;font-size:25px;font-weight:bold;color:#ffd700;text-shadow:0 0 10px #ff8800;opacity:0;transition:opacity .4s;white-space:nowrap;z-index:5}
#sub-disp{position:absolute;top:44px;left:50%;transform:translateX(-50%);pointer-events:none;font-size:13px;font-weight:bold;color:#cc88ff;opacity:0;transition:opacity .3s;white-space:nowrap;z-index:5}
#overlay{position:absolute;inset:0;background:rgba(0,0,0,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:20;padding:14px;overflow-y:auto}
#overlay h2{font-size:18px;color:#ffd700;text-align:center}
#overlay p{color:#aaa;font-size:12px;text-align:center;line-height:1.8}
#overlay button{background:#161b22;border:1px solid #ffd700;color:#ffd700;padding:6px 18px;font-family:monospace;font-size:12px;cursor:pointer;border-radius:4px}
#overlay button:hover{background:#ffd700;color:#000}
.shop-row{display:flex;justify-content:space-between;align-items:center;padding:5px 4px;border-bottom:1px solid #21262d}
.shop-row span{font-size:11px;color:#ccc}
.shop-btn{font-size:11px!important;padding:3px 10px!important;border-color:#58a6ff!important;color:#58a6ff!important;min-width:56px}
.shop-btn:disabled{border-color:#444!important;color:#444!important;cursor:not-allowed!important;background:#161b22!important}
.ability-card{background:#161b22;border:2px solid #3fb950;border-radius:8px;padding:10px 8px;width:128px;cursor:pointer;text-align:center;transition:all .15s}
.ability-card:hover{border-color:#ffd700;background:#1a2200}
.ability-card.upgrade{border-color:#e3b341}
.ability-card .aname{font-size:12px;font-weight:bold;color:#3fb950;margin-bottom:4px}
.ability-card.upgrade .aname{color:#e3b341}
.ability-card .adesc{font-size:10px;color:#8b949e;line-height:1.5}
.discard-card{background:#161b22;border:2px solid #f85149;border-radius:6px;padding:8px 6px;width:100px;cursor:pointer;text-align:center;transition:all .15s}
.ab-tooltip{cursor:default}
#ab-overlay{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(13,17,23,.96);border:1px solid #3fb950;border-radius:8px;padding:12px 16px;font-size:11px;color:#ccc;line-height:1.8;z-index:40;white-space:normal;pointer-events:none;max-width:220px;box-shadow:0 4px 20px rgba(0,0,0,.8);text-align:left}
#ab-overlay .ab-ov-name{font-size:13px;font-weight:bold;color:#3fb950;margin-bottom:6px}
.discard-card:hover{border-color:#fff;background:#2a0000}
#hint{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);font-size:10px;color:#444;white-space:nowrap;pointer-events:none}
</style></head><body>
<div id="ui-top">
  <div class="stat"><label>HP</label><div class="bw"><div class="bf" id="hp-fill" style="width:100%"></div></div><span class="sv" id="hp-text">60/60</span></div>
  <div class="stat"><label>EXP</label><div class="bw"><div class="bf" id="xp-fill" style="width:0%"></div></div><span class="sv" id="xp-text">0/200</span></div>
  <div class="stat"><label>Lv</label><span class="sv" id="lv-t">1</span></div>
  <div class="stat"><label>ATK</label><span class="sv" id="atk-t">12</span></div>
  <div class="stat"><label>CT</label><div class="bw" style="width:46px"><div class="bf" id="cd-fill" style="width:0%"></div></div><span class="sv" id="cd-t">OK</span></div>
  <div class="stat"><label>💰</label><span class="sv" id="gold-disp">0G</span></div>
  <div class="stat"><label>Floor</label><span class="sv" id="fl-t">1F</span></div>
  <div class="stat"><label>囲</label><span class="sv" id="circle-ct">3/3</span></div>
  <span id="phase-badge" class="pm">マップ</span>
</div>
<div id="main">
  <div id="sidebar">
    <div class="stt">武器(最大3)</div>
    <div id="weapon-list"></div>
    <div class="stt" style="margin-top:4px">装備中</div>
    <div id="eq-info" style="font-size:10px;color:#aaa;line-height:1.5"></div>
    <div class="stt" style="margin-top:4px">特殊能力(最大3)</div>
    <div id="ability-list" style="font-size:10px;color:#3fb950;line-height:1.9"></div>
    <div class="stt" style="margin-top:4px">強化</div>
    <div id="upg-info" style="font-size:10px;color:#8b949e;line-height:1.7"></div>
    <div class="stt" style="margin-top:4px">武器セットボーナス</div>
    <div id="set-bonus-info" style="font-size:10px;color:#ff88ff;line-height:1.7"></div>
  </div>
  <div id="cw">
    <canvas id="c"></canvas>
    <div id="combo-disp"></div>
    <div id="sub-disp"></div>
    <div id="hint"></div>
    <div id="ab-overlay"><div class="ab-ov-name" id="ab-ov-name"></div><div id="ab-ov-body"></div></div>
    <div id="overlay">
      <div style="text-align:center;margin-bottom:6px">
        <div style="font-size:32px;font-weight:bold;letter-spacing:4px;color:#58a6ff;text-shadow:0 0 24px #3388ff,0 0 48px #1144ff88">Rogue Trail</div>
        <div style="font-size:11px;color:#8b949e;letter-spacing:3px;margin-top:2px">— 軌跡を描き、道を切り拓け —</div>
      </div>
      <p style="font-size:11px;color:#8b949e;line-height:1.9;text-align:center">
        WASD:移動 &nbsp;|&nbsp; ドラッグ:軌跡攻撃（射程内から）<br>
        双剣:2連撃CT &nbsp;|&nbsp; 大鎌:CT5秒固定<br>
        魔杖:自動魔法弾+囲み &nbsp;|&nbsp; 魔剣:囲み<br>
        武器は最大3本・レアモンスターを逃がすな！
      </p>
      <div style="display:flex;gap:10px;margin-top:6px">
        <button onclick="startGame()" style="font-size:15px;letter-spacing:2px;padding:10px 32px;background:linear-gradient(135deg,#0d1117,#1a2030);border:2px solid #58a6ff;color:#58a6ff;box-shadow:0 0 16px #3388ff66">▶ スタート</button>
        <button onclick="showRankingScreen()" style="font-size:13px;padding:10px 18px;border:2px solid #ffd700;color:#ffd700;background:linear-gradient(135deg,#0d1117,#1a1a00)">🏆 ランキング</button>
      </div>
    </div>
  </div>
  <div id="log-panel"><div style="font-size:10px;color:#8b949e;margin-bottom:3px">ログ</div><div id="log"></div></div>
</div>
<script>
// ══ AUDIO ══
const AC=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,type,vol,start,dur){const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=type;o.frequency.value=f;g.gain.setValueAtTime(vol,start);g.gain.exponentialRampToValueAtTime(0.0001,start+dur);o.start(start);o.stop(start+dur+0.02);}
function sndHit(n){const fs=[330,415,523,659,880];for(let i=0;i<Math.min(n,5);i++)tone(fs[i],'square',.09,AC.currentTime+i*.10,.12);}
function sndPenta(){[[294,0],[370,.16],[440,.32],[370,.48],[523,.65],[523,.85]].forEach(([f,t])=>{tone(f,'sawtooth',.14,AC.currentTime+t,.20);tone(f*2,'sine',.06,AC.currentTime+t,.20);});[523,659,784].forEach(f=>tone(f,'sine',.08,AC.currentTime+1.1,.6));}
function sndWeaponGet(ri){const b=ri===3?1046:ri===2?880:ri===1?659:523;[b,b*1.25,b*1.5,b*2].forEach((f,i)=>tone(f,'sine',.08,AC.currentTime+i*.06,.11));}
function sndCircle(){[880,1108,1318,1760].forEach((f,i)=>tone(f,i%2?'sine':'triangle',.10,AC.currentTime+i*.07,.18));}
function sndGameOver(){[[110,0,.18,.55,'sawtooth'],[98,.5,.16,.45,'sawtooth'],[87,1.0,.18,.55,'sawtooth'],[98,1.5,.12,.35,'sawtooth'],[65,1.9,.22,.9,'sawtooth']].forEach(([f,t,v,d,ty])=>{tone(f,ty,v,AC.currentTime+t,d);tone(f*.5,ty,v*.5,AC.currentTime+t,d);});}
function sndStep(){tone(220+Math.random()*40,'triangle',.04,AC.currentTime,.04);setTimeout(()=>tone(200+Math.random()*40,'triangle',.04,AC.currentTime,.04),80);}
function sndShop(){[523,659,784,1046].forEach((f,i)=>tone(f,'sine',.06,AC.currentTime+i*.05,.1));}
function sndUpgrade(){[440,554,659,880,1108].forEach((f,i)=>tone(f,'sine',.07,AC.currentTime+i*.06,.13));}
function sndDamage(){tone(180,'sawtooth',.15,AC.currentTime,.06);tone(140,'sawtooth',.10,AC.currentTime+.05,.08);}
function sndAbilityGet(){[659,784,880,1046,1318].forEach((f,i)=>tone(f,'sine',.08,AC.currentTime+i*.07,.14));}
function sndBossRevive(){[[196,0],[165,.2],[147,.4],[131,.6],[110,.9]].forEach(([f,t])=>{tone(f,'sawtooth',.18,AC.currentTime+t,.35);tone(f*.5,'square',.08,AC.currentTime+t,.35);});}
function sndMordeR(){for(let i=0;i<8;i++)tone(55+i*8,'sawtooth',.12,AC.currentTime+i*.1,.25);tone(55,'sawtooth',.2,AC.currentTime+.8,.8);}
function sndMordeQ(){[220,262,196].forEach((f,i)=>tone(f,'sawtooth',.10,AC.currentTime+i*.08,.2));}
function sndMordeE(){tone(330,'square',.08,AC.currentTime,.05);tone(262,'sawtooth',.12,AC.currentTime+.05,.15);}
function sndRareEscape(){[880,1046,1318,1760].forEach((f,i)=>tone(f,'sine',.07,AC.currentTime+i*.06,.1));}
function sndJump(){tone(150,'square',.1,AC.currentTime,.05);tone(200,'square',.08,AC.currentTime+.06,.05);}
function sndMagicShot(){tone(660,'sine',.05,AC.currentTime,.08);tone(880,'sine',.04,AC.currentTime+.04,.06);}
function sndDiscard(){tone(220,'sawtooth',.06,AC.currentTime,.1);tone(180,'sawtooth',.05,AC.currentTime+.08,.08);}

let bgmTimer=null,bgmType='';
const BGM={
  map:      {m:[196,0,220,196,0,175,196,0,220,0,247,220,0,196,175,0],b:[98,0,98,0,98,0,98,0,98,0,110,0,98,0,87,0],bps:1.8},
  battle:   {m:[220,0,247,262,0,220,196,0,220,0,262,0,294,0,262,220],b:[110,0,110,0,131,0,131,0,110,0,110,0,110,0,131,0],bps:2.8},
  boss:     {m:[196,0,220,0,196,0,175,0,165,0,196,0,220,0,196,0],b:[98,0,98,0,87,0,87,0,82,0,87,0,98,0,98,0],bps:2.4},
  finalBoss:{m:[175,0,165,0,147,0,131,0,165,0,175,0,165,0,147,0],b:[87,0,82,0,73,0,65,0,82,0,87,0,82,0,73,0],bps:2.2},
  mermaid:  {m:[523,659,784,880,784,659,523,0,587,740,880,988,880,740,587,0],b:[262,0,262,0,294,0,294,0,262,0,262,0,294,0,294,0],bps:1.6},
};
function startBGM(type){if(bgmType===type)return;stopBGM();bgmType=type;const cfg=BGM[type];if(!cfg)return;const b=1/cfg.bps;function play(){const now=AC.currentTime;cfg.m.forEach((f,i)=>{if(f)tone(f,'square',.03,now+i*b*.5,b*.45);});cfg.b.forEach((f,i)=>{if(f)tone(f,'sawtooth',.04,now+i*b*.5,b*.9);});}play();bgmTimer=setInterval(play,cfg.m.length*b*.5*1000);}
function stopBGM(){clearInterval(bgmTimer);bgmTimer=null;bgmType='';}


// ══ IMAGE LOADER ══
const BASE = 'https://raw.githubusercontent.com/reotiku/Image-folder/main/';
const IMG_MAP = {player:'player.png',slime:'slime.png',bat:'bat.png',goblin:'goblin.png',ghost:'ghost.png',skeleton:'skeleton.png',demon:'demon.png',dragon:'dragon.png',mini_troll:'mini_troll.png',mini_nessie:'mini_nessie.png',chest_silver:'chest.png',chest_gold:'chest.png',boss_troll:'boss_troll.png',boss_nessie:'boss_nessie.png',boss_void1:'boss_void1.png',boss_void2:'boss_void2.png',boss_void3:'boss_void3.png',zarcael:'Zarcael.png',mermaid:'Mermaid.png'};
const IMGS={};
// スプライトキャッシュ: {key_size: OffscreenCanvas}
const SPRITE_CACHE={};
function getCachedSprite(key,size){
  const ckey=key+'_'+size;
  if(SPRITE_CACHE[ckey])return SPRITE_CACHE[ckey];
  const img=IMGS[key];if(!img)return null;
  const oc=new OffscreenCanvas(size,size);
  const oc2=oc.getContext('2d');
  oc2.drawImage(img,0,0,size,size);
  SPRITE_CACHE[ckey]=oc;
  return oc;
}
function loadImages(){Object.entries(IMG_MAP).forEach(([k,f])=>{const img=new Image();img.crossOrigin='anonymous';img.src=BASE+f;img.onload=()=>{IMGS[k]=img;// ロード完了時にキャッシュ削除（サイズ変更対応）
  Object.keys(SPRITE_CACHE).forEach(ck=>{if(ck.startsWith(k+'_'))delete SPRITE_CACHE[ck];});};});}
loadImages();
function drawWithImg(key,fallbackFn,ctx,x,y,r,col,fl,...extra){if(IMGS[key]&&!fl){const size=Math.ceil(r*2);const sp=getCachedSprite(key,size);if(sp){ctx.drawImage(sp,x-r,y-r,size,size);}else{ctx.drawImage(IMGS[key],x-r,y-r,r*2,r*2);}}else{fallbackFn(ctx,x,y,r,col,fl,...extra);}}


// ══ BATTLE BACKGROUNDS ══
function drawBattleBG(ctx, w, h, area, tick) {
  ctx.save();

  if (area === 1) {
    const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w,h)*.7);
    grad.addColorStop(0, '#0d1f0d');
    grad.addColorStop(0.5, '#071407');
    grad.addColorStop(1, '#020802');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    for (let i = 0; i < 5; i++) {
      const fogX = (w * 0.2 * i + tick * 0.15 * (i % 2 === 0 ? 1 : -1)) % w;
      const fogGrad = ctx.createRadialGradient(fogX, h*0.5, 0, fogX, h*0.5, w*0.38);
      fogGrad.addColorStop(0, 'rgba(30,60,20,0.10)');
      fogGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = fogGrad;
      ctx.fillRect(0, 0, w, h);
    }

    const treesBack = [
      {x:0.03,h:0.55,w:0.06}, {x:0.13,h:0.65,w:0.07}, {x:0.22,h:0.50,w:0.055},
      {x:0.76,h:0.60,w:0.065},{x:0.86,h:0.70,w:0.07}, {x:0.95,h:0.52,w:0.058}
    ];
    treesBack.forEach(t => {
      ctx.fillStyle = '#0a1a08';
      ctx.fillRect(w*t.x - w*0.008, h*0.45, w*0.016, h*0.55);
      for (let s = 0; s < 3; s++) {
        ctx.beginPath();
        const ty = h*0.45 - s * h*0.1;
        ctx.moveTo(w*t.x, ty - h*0.15);
        ctx.lineTo(w*t.x - w*t.w*(1-s*0.15), ty);
        ctx.lineTo(w*t.x + w*t.w*(1-s*0.15), ty);
        ctx.closePath();
        ctx.fillStyle = s === 0 ? '#0a1a08' : '#0d2010';
        ctx.fill();
      }
    });

    [{x:0.0,w:0.09},{x:0.94,w:0.09}].forEach(t => {
      ctx.fillStyle = '#061006';
      ctx.fillRect(w*t.x - w*0.012, 0, w*0.024, h);
      for (let s = 0; s < 5; s++) {
        ctx.beginPath();
        const ty = h*0.05 + s * h*0.12;
        ctx.moveTo(w*t.x, ty - h*0.15);
        ctx.lineTo(w*t.x - w*t.w*(1-s*0.1), ty);
        ctx.lineTo(w*t.x + w*t.w*(1-s*0.1), ty);
        ctx.closePath();
        ctx.fillStyle = s%2===0 ? '#061006' : '#081508';
        ctx.fill();
      }
    });

    for (let i = 0; i < 14; i++) {
      const fx = w * (0.1 + 0.8 * ((i*0.137 + tick*0.002*(i%2===0?1:-1)) % 1));
      const fy = h * (0.1 + 0.75 * ((i*0.251 + tick*0.001*(i%3===0?1:0.5)) % 1));
      const alpha = 0.3 + 0.4*Math.sin(tick*0.05 + i*1.3);
      ctx.fillStyle = `rgba(150,255,100,${alpha})`;
      ctx.shadowColor = 'rgba(100,255,50,0.8)';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(fx, fy, 2, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

  } else if (area === 2) {
    const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w,h)*.7);
    grad.addColorStop(0, '#040d1a');
    grad.addColorStop(0.6, '#020810');
    grad.addColorStop(1, '#010408');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    for (let i = 0; i < 6; i++) {
      const lx = w*(0.1 + 0.8*(i/6));
      const lGrad = ctx.createLinearGradient(lx, 0, lx + Math.sin(tick*0.02+i)*30, h);
      lGrad.addColorStop(0, `rgba(0,80,160,${0.06+0.04*Math.sin(tick*0.03+i)})`);
      lGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = lGrad;
      ctx.fillRect(0, 0, w, h);
    }

    [0.04, 0.18, 0.78, 0.93].forEach(px => {
      ctx.fillStyle = '#060e1a';
      ctx.fillRect(w*px-12, 0, 24, h);
      for (let s = 0; s < 7; s++) {
        ctx.strokeStyle = '#0a1828';
        ctx.lineWidth = 1;
        ctx.strokeRect(w*px-10, h*0.05+s*h*0.13, 20, h*0.04);
      }
      ctx.fillStyle = '#08121f';
      ctx.fillRect(w*px-18, 0, 36, 14);
    });

    for (let i = 0; i < 18; i++) {
      const bx = w*((i*0.179+0.05)%1);
      const by = h*(1-((tick*0.003*(0.5+i%3*0.3)+i*0.123)%1));
      const alpha = 0.12+0.08*Math.sin(tick*0.05+i);
      ctx.strokeStyle = `rgba(100,200,255,${alpha})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(bx, by, 1.5+i%3, 0, Math.PI*2);
      ctx.stroke();
    }

    for (let i = 0; i < 6; i++) {
      const gx = w*(0.12+i*0.15);
      const gy = h*(0.2+((i*0.37+tick*0.0003)%0.6));
      const alpha = 0.18+0.12*Math.sin(tick*0.04+i*1.2);
      ctx.fillStyle = `rgba(0,150,255,${alpha})`;
      ctx.shadowColor = 'rgba(0,100,255,0.5)';
      ctx.shadowBlur = 8;
      ctx.font = '13px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(['∆','◈','⊕','◇','⊗','※'][i], gx, gy);
    }
    ctx.shadowBlur = 0;

  } else {
    ctx.fillStyle = '#06000f';
    ctx.fillRect(0, 0, w, h);

    const vGrad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w,h)*0.6);
    vGrad.addColorStop(0, `rgba(60,0,120,${0.12+0.05*Math.sin(tick*0.02)})`);
    vGrad.addColorStop(0.4, `rgba(30,0,60,0.08)`);
    vGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = vGrad;
    ctx.fillRect(0, 0, w, h);

    ctx.fillStyle = '#08000f';
    ctx.fillRect(0, 0, w*0.12, h*0.35);
    ctx.fillRect(w*0.85, 0, w*0.15, h*0.35);
    ctx.fillRect(w*0.02, 0, w*0.08, h*0.18);
    ctx.fillRect(w*0.88, 0, w*0.09, h*0.20);
    for (let i = 0; i < 4; i++) {
      ctx.fillRect(w*0.02+i*w*0.018, 0, w*0.012, h*0.04);
      ctx.fillRect(w*0.88+i*w*0.02, 0, w*0.012, h*0.04);
    }
    ctx.fillRect(w*0.35, 0, w*0.3, h*0.20);
    ctx.fillStyle = '#06000f';
    ctx.beginPath();
    ctx.arc(w*0.5, h*0.22, w*0.08, Math.PI, 0);
    ctx.fill();
    ctx.fillRect(w*0.42, h*0.22, w*0.16, h*0.08);

    for (let i = 0; i < 5; i++) {
      const rx = w*(0.1+i*0.2);
      const ry = h*(0.2+(i%2)*0.25);
      const rAlpha = 0.12+0.08*Math.sin(tick*0.04+i*0.8);
      ctx.strokeStyle = `rgba(120,0,255,${rAlpha})`;
      ctx.lineWidth = 1.5;
      ctx.shadowColor = 'rgba(100,0,255,0.4)';
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.moveTo(rx-12, ry-25);
      ctx.lineTo(rx+8, ry);
      ctx.lineTo(rx-8, ry+25);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;

    for (let i = 0; i < 10; i++) {
      const sx = w*((i*0.173+tick*0.0008*(i%2===0?1:-1))%1);
      const sy = h*(0.05+0.85*((i*0.317+tick*0.0005)%1));
      const sAlpha = 0.18+0.12*Math.sin(tick*0.06+i*0.9);
      ctx.fillStyle = `rgba(150,50,255,${sAlpha})`;
      ctx.shadowColor = 'rgba(100,0,255,0.7)';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(sx, sy, 2.5, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

function getSetBonusKey(weapons){
  const ssrs=weapons.filter(w=>w.ri===3&&!w.isUR);
  if(ssrs.length<2)return null;
  const [a,b]=ssrs.slice(0,2).map(w=>w.bi).sort((x,y)=>x-y);
  return a+','+b;
}

function checkAndApplySetBonus(){
  const key=getSetBonusKey(G.weapons);
  const ssrs=G.weapons.filter(w=>w.ri===3&&!w.isUR);
  if(!key||ssrs.length<2){
    G.weapons.forEach(w=>clearSetBonus(w));
    G.activeSetBonus=null;
    return;
  }
  if(G.activeSetBonus===key)return;
  // リセット
  G.weapons.forEach(w=>clearSetBonus(w));
  G.activeSetBonus=key;
  const sb=SET_BONUS_TABLE[key];
  if(!sb){G.activeSetBonus=null;return;}
  // 3本目（SSRでない武器）に付与、なければ最初のSSRに付与
  const target=G.weapons.find(w=>w.ri!==3||w.isUR)||G.weapons[2]||G.weapons[0];
  sb.apply(target);
  target.setBonus=sb;
  log(`✨ セットボーナス発動：${sb.label}（${target.name}に付与）`,'le');
  showSub(`✨ ${sb.label}`);
  applySetBonusStats();
  renderWList();
}

function clearSetBonus(w){
  delete w.setBonusAtk;delete w.setBonusTrail;delete w.setBonusThick;
  delete w.setBonusCritRate;delete w.setBonusCritMul;delete w.setBonusCTpct;
  delete w.setBonusHP;delete w.setBonusDmgRed;delete w.setBonusRegenIv;
  delete w.setBonusRegenPct;delete w.setBonusShieldCD;delete w.setBonusGhostDur;
  delete w.setBonusGoldPct;delete w.setBonusXPpct;delete w.setBonusLvAtk;
  delete w.setBonusRarePct;delete w.setBonus;
}

function applySetBonusStats(){
  // HP・CD・再生ボーナスを即時反映
  G.weapons.forEach(w=>{
    if(w.setBonusHP){G.maxHp+=w.setBonusHP;G.hp=Math.min(G.maxHp,G.hp+w.setBonusHP);}
    if(w.setBonusShieldCD)G.shieldCDMax=Math.max(300,G.shieldCDMax+w.setBonusShieldCD);
    if(w.setBonusGhostDur)G.ghostDur+=w.setBonusGhostDur;
  });
}

// ══ ZARCAEL (堕天使ダーキン) DRAW ══
function drawZarcael(c,x,y,r,col,fl,phase){
  c.save();
  const t=G.tick||0;
  const pc=phase===2?'#ff4400':phase===3?'#cc00ff':'#3388ff';
  const dark=phase===2?'#1a0800':phase===3?'#0a0018':'#00081a';

  // 外オーラ
  const aura=c.createRadialGradient(x,y,r*.2,x,y,r*(phase===3?2.2:1.8));
  aura.addColorStop(0,`rgba(${phase===2?'255,80,0':phase===3?'160,0,255':'40,120,255'},${ .18+.07*Math.sin(t*.07)})`);
  aura.addColorStop(1,'rgba(0,0,0,0)');
  c.fillStyle=aura;c.beginPath();c.arc(x,y,r*2.2,0,Math.PI*2);c.fill();

  // 大きな禍々しい翼（左右）
  [[-1,-.35],[1,.35]].forEach(([sx,angle])=>{
    c.save();c.translate(x,y);c.scale(sx,1);
    // 外翼
    c.fillStyle=fl?'rgba(200,200,255,.7)':`rgba(${phase===2?'180,40,0':phase===3?'100,0,180':'10,40,140'},.85)`;
    c.beginPath();
    c.moveTo(0,-r*.2);
    c.bezierCurveTo(r*.5,-r*1.8,r*2.2,-r*1.6,r*2.6,-r*.4);
    c.bezierCurveTo(r*2.2,r*.3,r*1.2,r*.6,r*.4,r*.3);
    c.closePath();c.fill();
    // 翼の模様（羽根の筋）
    c.strokeStyle=fl?'rgba(255,255,255,.4)':`rgba(${phase===2?'255,100,20':phase===3?'180,80,255':'80,160,255'},.5)`;
    c.lineWidth=r*.06;
    for(let i=0;i<4;i++){
      const t2=i/3.5;
      c.beginPath();
      c.moveTo(r*.1,-r*.1);
      c.quadraticCurveTo(r*(1+t2*.8),-r*(1.2+t2*.3),r*(1.8+t2*.5),-r*(.2-t2*.2));
      c.stroke();
    }
    // 小さな内翼（下翼）
    c.fillStyle=fl?'rgba(180,180,255,.5)':`rgba(${phase===2?'140,20,0':phase===3?'70,0,140':'5,20,100'},.7)`;
    c.beginPath();
    c.moveTo(r*.1,r*.3);
    c.bezierCurveTo(r*.8,r*.1,r*1.4,r*.8,r*1.2,r*1.2);
    c.bezierCurveTo(r*.8,r*1.3,r*.3,r*1.0,r*.1,r*.7);
    c.closePath();c.fill();
    c.restore();
  });

  // 体（鎧：胴体）
  c.fillStyle=fl?'#ccc':dark;
  c.beginPath();c.ellipse(x,y+r*.3,r*.48,r*.75,0,0,Math.PI*2);c.fill();
  // 鎧ライン
  c.strokeStyle=fl?'#fff':pc;c.lineWidth=r*.06;
  c.beginPath();c.moveTo(x,y-r*.3);c.lineTo(x,y+r*.9);c.stroke();
  c.beginPath();c.moveTo(x-r*.35,y+r*.1);c.lineTo(x+r*.35,y+r*.1);c.stroke();
  // 肩アーマー
  [[-1],[1]].forEach(([sx])=>{
    c.fillStyle=fl?'#aaa':dark;
    c.beginPath();c.ellipse(x+sx*r*.55,y-r*.1,r*.28,r*.22,sx*.4,0,Math.PI*2);c.fill();
    c.strokeStyle=pc;c.lineWidth=r*.05;
    c.beginPath();c.ellipse(x+sx*r*.55,y-r*.1,r*.28,r*.22,sx*.4,0,Math.PI*2);c.stroke();
  });

  // 頭部
  c.fillStyle=fl?'#ddd':dark;
  c.beginPath();c.ellipse(x,y-r*.65,r*.35,r*.4,0,0,Math.PI*2);c.fill();
  // 角（2本）
  [[-1],[1]].forEach(([sx])=>{
    c.fillStyle=fl?'#eee':`rgba(${phase===2?'255,120,0':phase===3?'200,80,255':'80,180,255'},1)`;
    c.beginPath();
    c.moveTo(x+sx*r*.18,y-r*.95);
    c.lineTo(x+sx*r*.35,y-r*1.55);
    c.lineTo(x+sx*r*.12,y-r*.98);
    c.closePath();c.fill();
  });
  // 顔の発光目
  const ec=fl?'#fff':pc;
  c.fillStyle=ec;c.shadowColor=ec;c.shadowBlur=12;
  c.beginPath();c.ellipse(x-r*.14,y-r*.68,r*.1,r*.07,-.2,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(x+r*.14,y-r*.68,r*.1,r*.07,.2,0,Math.PI*2);c.fill();
  c.shadowBlur=0;

  // ポセイドン槍（右手）
  c.save();c.translate(x+r*.5,y+r*.2);c.rotate(-.55+Math.sin(t*.04)*.08);
  // 柄
  c.strokeStyle=fl?'#bbb':`rgba(${phase===2?'220,80,0':phase===3?'160,0,255':'60,140,255'},1)`;
  c.lineWidth=r*.1;c.lineCap='round';
  c.beginPath();c.moveTo(0,0);c.lineTo(r*.3,-r*1.7);c.stroke();
  // 穂先（三叉）
  const spearCol=fl?'#eee':pc;
  c.fillStyle=spearCol;c.strokeStyle=spearCol;c.lineWidth=r*.06;
  // 中央穂先
  c.beginPath();c.moveTo(-r*.08,-r*1.7);c.lineTo(0,-r*2.3);c.lineTo(r*.08,-r*1.7);c.closePath();c.fill();
  [[-1],[1]].forEach(([sx])=>{
    c.fillStyle=spearCol;c.strokeStyle=spearCol;c.lineWidth=r*.06;
    // 左右サブ穂先
    c.beginPath();c.moveTo(sx*r*.06,-r*1.72);c.lineTo(sx*r*.32,-r*2.1);c.lineTo(sx*r*.18,-r*1.68);c.closePath();c.fill();
  });
  // 槍グロー
  c.shadowColor=pc;c.shadowBlur=10;
  c.strokeStyle=pc;c.lineWidth=r*.04;
  c.beginPath();c.moveTo(0,0);c.lineTo(r*.3,-r*1.7);c.stroke();
  c.shadowBlur=0;
  c.restore();

  // フェーズ2バリア表示
  if(phase===2&&!fl){
    c.strokeStyle=`rgba(255,120,0,${.5+.2*Math.sin(t*.12)})`;
    c.lineWidth=4;c.setLineDash([8,4]);
    c.beginPath();c.arc(x,y,r*1.4,0,Math.PI*2);c.stroke();
    c.setLineDash([]);
  }
  // フェーズ3 禍々しいエネルギーリング
  if(phase===3){
    c.strokeStyle=`rgba(180,0,255,${.4+.2*Math.sin(t*.09)})`;
    c.lineWidth=3;c.setLineDash([5,5]);
    c.beginPath();c.ellipse(x,y+r*.1,r*1.2,r*1.4,0,0,Math.PI*2);c.stroke();
    c.setLineDash([]);
  }

  c.restore();
}

function getEnemyPool(totalFloor){
  if(totalFloor<=5)  return [0,0,0,1,1,2,6];
  if(totalFloor<=10) return [0,1,1,2,2,6,3];
  if(totalFloor<=15) return [1,2,6,3,3,4,5];

// ══ MAP ══
const TILE=78,MC=7,MR=7;
const EMPTY=0,WALL=1,STAIR=2,ITEM=3,CHEST=4,TRAP=5,ECELL=6,BOSS_CELL=7,SHOP=8,MHOUSE=9,MERMAID_CELL=10;
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function md(x1,y1,x2,y2){return Math.abs(x1-x2)+Math.abs(y1-y2);}

function genFloor(){
  const cells=[];const meta={};const isBoss=(G.floor%10===0);
  const ng=G.ng||1;
  for(let y=0;y<MR;y++){cells.push([]);for(let x=0;x<MC;x++)cells[y].push(EMPTY);}
  // 壁配置
  for(let i=0;i<rnd(3,6);i++){
    let x,y,t=0;
    do{x=rnd(0,MC-1);y=rnd(0,MR-1);t++;}while(t<50&&(x===G.px&&y===G.py));
    if(t<50)cells[y][x]=WALL;
  }
  // ── 修正①: 階段配置 ──
  // 最低2マス離れた空きマスを探す。
  // 配置後、プレイヤー→階段の経路が壁で完全に塞がれないよう
  // 隣接8マスの壁を除去して必ず到達可能にする。
  let sx,sy,st=0;
  do{sx=rnd(0,MC-1);sy=rnd(0,MR-1);st++;}while(st<200&&(cells[sy][sx]!==EMPTY||md(sx,sy,G.px,G.py)<2));
  if(st>=200){
    // フォールバック：とにかく空きマスに置く
    st=0;do{sx=rnd(0,MC-1);sy=rnd(0,MR-1);st++;}while(st<200&&cells[sy][sx]!==EMPTY);
  }
  cells[sy][sx]=STAIR;
  meta[sy*MC+sx]={locked:isBoss&&!G.bossDefeated};
  // 階段の隣接8マスの壁を除去（プレイヤー座標は除く）
  for(let dy=-1;dy<=1;dy++){
    for(let dx=-1;dx<=1;dx++){
      if(dx===0&&dy===0)continue;
      const nx=sx+dx,ny=sy+dy;
      if(nx>=0&&nx<MC&&ny>=0&&ny<MR){
        if(cells[ny][nx]===WALL&&!(nx===G.px&&ny===G.py)){
          cells[ny][nx]=EMPTY;
        }
      }
    }
  }

  // アイテム等配置
  const place=(t,n)=>{for(let i=0;i<n;i++){let x,y,tt=0;do{x=rnd(0,MC-1);y=rnd(0,MR-1);tt++;}while(tt<100&&(cells[y][x]!==EMPTY));if(tt<100)cells[y][x]=t;}};
  place(ITEM,rnd(1,2));place(CHEST,rnd(0,1));place(TRAP,rnd(0,2));
  if(G.floor%3===0)place(SHOP,1);
  if(!isBoss&&Math.random()<0.35){place(MHOUSE,1);}
  // 2面5階：Mermaid専用マスを配置（未撃破時のみ）
  if(G.area===2&&G.floor===5&&!G.mermaidDefeated){
    let mx,my,mt=0;do{mx=rnd(0,MC-1);my=rnd(0,MR-1);mt++;}while(mt<100&&(cells[my][mx]!==EMPTY||md(mx,my,G.px,G.py)<3));
    if(mt<100)cells[my][mx]=MERMAID_CELL;
  }
  if(isBoss){
    let bx,by,t=0;do{bx=rnd(0,MC-1);by=rnd(0,MR-1);t++;}while(t<100&&(cells[by][bx]!==EMPTY||md(bx,by,G.px,G.py)<3));
    if(t<100)cells[by][bx]=BOSS_CELL;
  } else {
    // 2週目は敵数底上げ: 面ごとに min/max を大幅増加
    const ngEnemyBase=ng>=2?[
      [8,25],[14,30],[18,35]  // 1面/2面/3面
    ]:null;
    const areaMin = ngEnemyBase ? ngEnemyBase[G.area-1][0] : [2,5,8][G.area-1];
    const areaMax = ngEnemyBase ? ngEnemyBase[G.area-1][1] : [10,15,20][G.area-1];
    const totalFloor=(G.area-1)*10+G.floor;
    const cntBase=rnd(areaMin,Math.min(areaMax,areaMin+Math.floor(totalFloor/2)));
    const ec=Math.min(6,rnd(2,4));
    for(let i=0;i<ec;i++){
      let x,y,t=0;do{x=rnd(0,MC-1);y=rnd(0,MR-1);t++;}while(t<100&&(cells[y][x]!==EMPTY||md(x,y,G.px,G.py)<2));
      if(t<100){cells[y][x]=ECELL;meta[y*MC+x]={cnt:cntBase};}
    }
  }
  G.cells=cells;G.meta=meta;G.revealed=new Set();revealAround(G.px,G.py);
}
function revealAround(px,py){for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){const rx=px+dx,ry=py+dy;if(rx>=0&&rx<MC&&ry>=0&&ry<MR)G.revealed.add(ry*MC+rx);}}

// ══ DRAW MAP ══
function drawMap(){
  ctx2.clearRect(0,0,cw,ch);ctx2.fillStyle='#0d1117';ctx2.fillRect(0,0,cw,ch);
  const ox=(cw-TILE*MC)/2,oy=(ch-TILE*MR)/2;
  for(let y=0;y<MR;y++)for(let x=0;x<MC;x++){
    const tx=ox+x*TILE,ty=oy+y*TILE,rev=G.revealed.has(y*MC+x),isWall=G.cells[y][x]===WALL;
    if(!rev){ctx2.fillStyle='#070b0f';ctx2.fillRect(tx+1,ty+1,TILE-2,TILE-2);ctx2.fillStyle='#1a1a2e';ctx2.font='11px monospace';ctx2.textAlign='center';ctx2.textBaseline='middle';ctx2.fillText('?',tx+TILE/2,ty+TILE/2);continue;}
    ctx2.fillStyle=isWall?'#21262d':'#161b22';ctx2.fillRect(tx+1,ty+1,TILE-2,TILE-2);ctx2.strokeStyle='#21262d';ctx2.lineWidth=1;ctx2.strokeRect(tx+1,ty+1,TILE-2,TILE-2);
    if(!isWall){
      const cx2=tx+TILE/2,cy2=ty+TILE/2,sm=G.meta[y*MC+x]||{},ct=G.cells[y][x];
      ctx2.textAlign='center';ctx2.textBaseline='middle';
      if(ct===STAIR){const lk=sm.locked;ctx2.fillStyle=lk?'#555':'#3fb950';ctx2.font='20px monospace';ctx2.fillText('▼',cx2,cy2-4);ctx2.font='9px monospace';ctx2.fillText(lk?'🔒封印':'階段',cx2,cy2+12);}
      else if(ct===ITEM){ctx2.fillStyle='#58a6ff';ctx2.font='22px monospace';ctx2.fillText('⚔',cx2,cy2);}
      else if(ct===CHEST){ctx2.fillStyle='#ffd700';ctx2.font='21px monospace';ctx2.fillText('📦',cx2,cy2);}
      else if(ct===TRAP){ctx2.fillStyle='#f85149';ctx2.font='18px monospace';ctx2.fillText('✕',cx2,cy2);}
      else if(ct===SHOP){ctx2.fillStyle='#58a6ff';ctx2.font='20px monospace';ctx2.fillText('🛒',cx2,cy2-4);ctx2.font='9px monospace';ctx2.fillStyle='#58a6ff';ctx2.fillText('ショップ',cx2,cy2+12);}
      else if(ct===ECELL){ctx2.fillStyle='#f85149';ctx2.font='20px monospace';ctx2.fillText('💀',cx2,cy2-4);ctx2.font='9px monospace';ctx2.fillStyle='#f85149';ctx2.fillText('×'+(sm.cnt||1),cx2,cy2+12);}
      else if(ct===BOSS_CELL){ctx2.fillStyle='#ffd700';ctx2.font='22px monospace';ctx2.fillText('👑',cx2,cy2-4);ctx2.font='9px monospace';ctx2.fillStyle='#ffd700';ctx2.fillText('BOSS',cx2,cy2+13);}
      else if(ct===MERMAID_CELL){ctx2.fillStyle='#00cccc';ctx2.font='22px monospace';ctx2.fillText('🧜',cx2,cy2-4);ctx2.font='9px monospace';ctx2.fillStyle='#00cccc';ctx2.fillText('Mermaid',cx2,cy2+13);}
    }
  }
  const px2=ox+G.px*TILE+TILE/2,py2=oy+G.py*TILE+TILE/2;
  if(IMGS['player']){ctx2.save();ctx2.drawImage(IMGS['player'],px2-24,py2-28,48,56);ctx2.restore();}else{drawStick(ctx2,px2,py2,22,true,false);}
  ctx2.fillStyle='#8b949e';ctx2.font='11px monospace';ctx2.textAlign='left';ctx2.textBaseline='top';
  const an=['森の迷宮','深海遺跡','虚無の城塞'];
  ctx2.fillText(an[G.area-1]+' '+G.floor+'F'+(G.floor%10===0?' 【ボス】':''),ox,oy-18);
}

function drawBattle(){
  const b=G.battle;if(!b)return;
  ctx2.clearRect(0,0,cw,ch);drawBattleBG(ctx2,cw,ch,G.area,G.tick);
  ctx2.strokeStyle='#1c2128';ctx2.lineWidth=1;ctx2.beginPath();ctx2.arc(cw/2,ch/2,Math.min(cw,ch)*.46,0,Math.PI*2);ctx2.stroke();
  const w=G.weapons[G.sel];
  ctx2.strokeStyle=G.cd===0?'rgba(80,200,80,.2)':'rgba(80,80,80,.15)';ctx2.lineWidth=1.5;ctx2.setLineDash([3,3]);ctx2.beginPath();ctx2.arc(b.px,b.py,getRange(),0,Math.PI*2);ctx2.stroke();ctx2.setLineDash([]);
  if(G.abilities.includes('shield')&&G.shieldTimer>0){ctx2.strokeStyle=`rgba(100,180,255,${.4+.2*Math.sin(G.tick*.1)})`;ctx2.lineWidth=3;ctx2.beginPath();ctx2.arc(b.px,b.py,36,0,Math.PI*2);ctx2.stroke();}
  if(G.ghostTimer>0)ctx2.globalAlpha=.4;
  if(b.hasRare){ctx2.fillStyle='rgba(0,0,0,.5)';ctx2.fillRect(cw/2-80,8,160,10);ctx2.fillStyle=b.rareTimer/b.rareTimerMax>.5?'#ffd700':'#f85149';ctx2.fillRect(cw/2-80,8,160*(b.rareTimer/b.rareTimerMax),10);ctx2.strokeStyle='#ffd700';ctx2.lineWidth=1;ctx2.strokeRect(cw/2-80,8,160,10);ctx2.fillStyle='#fff';ctx2.font='9px monospace';ctx2.textAlign='center';ctx2.textBaseline='middle';ctx2.fillText('レアモン逃走まで',cw/2,30);}
  if(b.realmZones)b.realmZones.forEach(rz=>{ctx2.fillStyle=`rgba(100,0,180,${.15+.06*Math.sin(G.tick*.08)})`;ctx2.beginPath();ctx2.arc(rz.x,rz.y,rz.r,0,Math.PI*2);ctx2.fill();ctx2.strokeStyle='rgba(150,0,255,.6)';ctx2.lineWidth=2;ctx2.setLineDash([3,3]);ctx2.beginPath();ctx2.arc(rz.x,rz.y,rz.r,0,Math.PI*2);ctx2.stroke();ctx2.setLineDash([]);});
  if(b.mordeQWarn)b.mordeQWarn.forEach(qw=>{const al=qw.life/qw.maxLife;ctx2.strokeStyle=`rgba(255,140,0,${al*.7})`;ctx2.lineWidth=qw.w+6;ctx2.lineCap='round';ctx2.beginPath();ctx2.moveTo(qw.x1,qw.y1);ctx2.lineTo(qw.x2,qw.y2);ctx2.stroke();});
  if(b.mordeQZones)b.mordeQZones.forEach(qz=>{const al=qz.life/qz.maxLife;ctx2.strokeStyle=`rgba(200,50,255,${al*.9})`;ctx2.lineWidth=qz.w;ctx2.lineCap='round';ctx2.beginPath();ctx2.moveTo(qz.x1,qz.y1);ctx2.lineTo(qz.x2,qz.y2);ctx2.stroke();});
  if(b.mordeEWarn&&b.mordeEWarn.life>0){const ew=b.mordeEWarn;const al=ew.life/ew.maxLife;ctx2.fillStyle=`rgba(150,0,255,${al*.4})`;ctx2.strokeStyle=`rgba(200,100,255,${al*.8})`;ctx2.lineWidth=3;ctx2.setLineDash([5,5]);ctx2.beginPath();ctx2.arc(ew.x,ew.y,ew.r,0,Math.PI*2);ctx2.fill();ctx2.stroke();ctx2.setLineDash([]);}
  if(b.warnZones)b.warnZones.forEach(wz=>{const al=Math.min(1,(wz.maxLife-wz.life)/15)*.5;ctx2.fillStyle=`rgba(255,130,0,${al})`;ctx2.beginPath();ctx2.arc(wz.x,wz.y,wz.r,0,Math.PI*2);ctx2.fill();ctx2.strokeStyle=`rgba(255,130,0,${al*1.6})`;ctx2.lineWidth=2.5;ctx2.beginPath();ctx2.arc(wz.x,wz.y,wz.r,0,Math.PI*2);ctx2.stroke();});
  if(b.atkZones)b.atkZones.forEach(az=>{ctx2.fillStyle=`rgba(255,20,20,${.25+.08*Math.sin(G.tick*.4)})`;ctx2.beginPath();ctx2.arc(az.x,az.y,az.r,0,Math.PI*2);ctx2.fill();ctx2.strokeStyle='rgba(255,20,20,.9)';ctx2.lineWidth=3;ctx2.beginPath();ctx2.arc(az.x,az.y,az.r,0,Math.PI*2);ctx2.stroke();});
  if(b.lineSweeps)b.lineSweeps.forEach(ls=>{const al=ls.life/ls.maxLife;if(ls.warn){ctx2.strokeStyle=`rgba(255,200,0,${al*.7})`;ctx2.lineWidth=ls.w+8;}else{ctx2.strokeStyle=`rgba(255,30,30,${al*.9})`;ctx2.lineWidth=ls.w;}ctx2.lineCap='round';ctx2.beginPath();ctx2.moveTo(ls.x1,ls.y1);ctx2.lineTo(ls.x2,ls.y2);ctx2.stroke();});
  if(b.walls)b.walls.forEach(wl=>{ctx2.fillStyle='rgba(200,50,50,.3)';ctx2.fillRect(wl.x,wl.y,wl.w,wl.h);ctx2.strokeStyle='#cc2233';ctx2.lineWidth=2;ctx2.strokeRect(wl.x,wl.y,wl.w,wl.h);});
  if(b.deathZones)b.deathZones.forEach(dz=>{ctx2.fillStyle=`rgba(100,0,150,${.18+.07*Math.sin(G.tick*.06)})`;ctx2.beginPath();ctx2.arc(dz.x,dz.y,dz.r,0,Math.PI*2);ctx2.fill();ctx2.strokeStyle='#9900ff';ctx2.lineWidth=2;ctx2.setLineDash([4,4]);ctx2.beginPath();ctx2.arc(dz.x,dz.y,dz.r,0,Math.PI*2);ctx2.stroke();ctx2.setLineDash([]);});
  if(b.explosions)b.explosions.forEach(ex=>{const al=ex.life/ex.maxLife;ctx2.fillStyle=`rgba(255,150,0,${al*.6})`;ctx2.beginPath();ctx2.arc(ex.x,ex.y,ex.r*(1.5-al*.5),0,Math.PI*2);ctx2.fill();});

  if(G.trail.length>=2){

    ctx2.strokeStyle=trailCol;ctx2.lineWidth=getThick(w);ctx2.lineCap='round';ctx2.lineJoin='round';
    ctx2.globalAlpha=.75;ctx2.beginPath();ctx2.moveTo(G.trail[0].x,G.trail[0].y);for(let i=1;i<G.trail.length;i++)ctx2.lineTo(G.trail[i].x,G.trail[i].y);ctx2.stroke();
    ctx2.globalAlpha=.22;ctx2.lineWidth=getThick(w)*2.5;ctx2.beginPath();ctx2.moveTo(G.trail[0].x,G.trail[0].y);for(let i=1;i<G.trail.length;i++)ctx2.lineTo(G.trail[i].x,G.trail[i].y);ctx2.stroke();ctx2.globalAlpha=1;

  b.enemies.forEach(e=>{

    }
    else if(e.isBoss){
      const bkey=e.name.includes('ネッシー')?'boss_nessie':e.name.includes('トロール')?'boss_troll':null;
      if(bkey&&IMGS[bkey]){

        if(e.flash>0){ctx2.globalAlpha=0.5;ctx2.filter='brightness(3)';}
        const er=e.r*4;ctx2.drawImage(IMGS[bkey],e.x-er,e.y-er,er*2,er*2);

      } else e.drawFn(ctx2,e.x,e.y,e.r,e.col,e.flash>0);
    }
    else{
      const EKEYS=['slime','bat','goblin','skeleton','demon','dragon','ghost','mini_troll','mini_nessie','chest_silver','chest_gold'];
      const ekey=EKEYS[e.ti];

        const er=e.r*3;ctx2.drawImage(IMGS[ekey],e.x-er,e.y-er,er*2,er*2);
        ctx2.restore();
      } else E_DRAW[e.ti](ctx2,e.x,e.y,e.r,e.col,e.flash>0);
    }
    if(e.burnTimer>0){ctx2.fillStyle=`rgba(255,100,0,${.4+.2*Math.sin(G.tick*.3)})`;ctx2.beginPath();ctx2.arc(e.x,e.y,e.r+4,0,Math.PI*2);ctx2.fill();}

function mapMove(k){

    G.charmedTimer--;

  }
  let nx=G.px,ny=G.py;
  if(k==='w')ny--;else if(k==='s')ny++;else if(k==='a')nx--;else if(k==='d')nx++;

  G.px=nx;G.py=ny;AC.resume();sndStep();revealAround(nx,ny);landMap(nx,ny);

function takeDamage(d,src){

  if(G.hp<=0){if(G.phase==='battle')endBattle(false);else die();}
}

    return;
  }
  if(type==='randomAbility'){
    if(G.gold<5000)return;
    const pool=ALL_ABILITIES.filter(a=>!G.abilities.includes(a.id));
    if(pool.length===0)return;
    G.gold-=5000;sndUpgrade();

    G.abilities.push(picked.id);

    if(picked.id==='toughguy'){G.maxHp+=50;G.hp=Math.min(G.hp+50,G.maxHp);}
    if(picked.id==='beam'){G.beamCD=0;G.beamCDMax=480;G.beamActive=null;}
    log('🎲 '+picked.name+' 取得！（上限+'+(G.abilityCap)+'）','le');

  updateUI();renderWList();renderShop();
};

function genWOpts(n){
  const tf=Math.min(G.floor+((G.area-1)*10),28);
  const fR=[Math.max(.08,.50-tf*.015),Math.max(.12,.28-tf*.002),Math.min(.45,.14+tf*.01),Math.min(.32,.06+tf*.01)];
  const s=fR.reduce((a,b)=>a+b,0);const nR=fR.map(v=>v/s);
  const opts=[];
  for(let i=0;i<n;i++){
    const bi=rnd(0,W_BASES.length-1);let ri=0,roll=Math.random(),acc=0;
    for(let r=0;r<RARITIES.length;r++){acc+=nR[r];if(roll<acc){ri=r;break;}}
    opts.push(mkW(bi,ri));
  }
  return opts;
}

function lvUp(){

    G.maxHp+=12;G.hp=Math.min(G.maxHp,G.hp+12);G.atk+=6;G.cdMax=calcCT(G.weapons[G.sel]);

function drainBossBonus(){

      ?[...G.abilities].sort(()=>Math.random()-.5).slice(0,3).map(id=>{const a=ALL_ABILITIES.find(x=>x.id===id);return{type:'upgrade',ability:a};})

// ══ BATTLE ══
const AREA_SCALE=[1,1.4,2.0];

function getSpawnPos(){
  const minDist=Math.min(cw,ch)*0.28;
  for(let i=0;i<60;i++){
    const x=80+Math.random()*(cw-160);
    const y=80+Math.random()*(ch-160);
    if(Math.hypot(x-cw/2,y-ch/2)>=minDist)return{x,y};
  }
  const a=Math.random()*Math.PI*2;
  return{
    x:Math.max(80,Math.min(cw-80,cw/2+Math.cos(a)*(minDist+30))),
    y:Math.max(80,Math.min(ch-80,ch/2+Math.sin(a)*(minDist+30)))
  };
}

function buildEnemyList(cnt,aM){
  const es=[];
  const totalFloor=(G.area-1)*10+G.floor;
  const pool=getEnemyPool(totalFloor).slice();
  if(G.area>=2&&pool.indexOf(7)<0)pool.push(7);
  if(G.area>=3&&pool.indexOf(8)<0)pool.push(8);
  const hasRare=Math.random()<0.12;
  // 2週目スポーン上限: 面ごとに25/30/35
  const ng=G.ng||1;
  const ngCapByArea=[25,30,35];
  const spawnCap=ng>=2?ngCapByArea[G.area-1]:30;
  const spawnCount=Math.max(1,Math.min(cnt,spawnCap));
  // 2週目モブ強化倍率 ×2
  const ngMobMul=ng>=2?Math.pow(1.8,ng-1):1; // 2周目×1.8、3周目×3.24、4周目×5.83…
  for(let i=0;i<spawnCount;i++){
    let ti;
    if(hasRare&&i===0){
      ti=Math.random()<0.5?9:10;
    } else {
      ti=pool[Math.floor(Math.random()*pool.length)];
    }
    if(ti===undefined||ti===null||!E_TYPES[ti])ti=0;
    const t=E_TYPES[ti];
    const hm=(1+G.floor*.1)*aM;
    const pos=getSpawnPos();
    const e={x:pos.x,y:pos.y,hp:Math.round(t.hp*hm*ngMobMul),maxHp:Math.round(t.hp*hm*ngMobMul),atk:Math.round(t.atk*(1+G.floor*.07)*aM*ngMobMul),xp:t.xp,gold:t.gold,r:t.r,spd:t.spd*(1+G.floor*.025),col:t.col,name:t.name,ti,flash:0,hitTimer:0,spTimer:rnd(80,180),burnTimer:0,slowTimer:0,rare:t.rare||false,rareType:t.rareType||null};
    if(ti===7||ti===8)e.spTimer=rnd(200,300);
    es.push(e);
  }
  return{es,hasRare};
}

function startBattle(cnt,isBoss){
  G.paused=false;
  G.phase='battle';G.cd=0;G.cdMax=calcCT(G.weapons[G.sel]);
  G.circleCt=3+getBonusCircle(G.weapons[G.sel]);G.twinFirstHit=false;
  const aM=AREA_SCALE[G.area-1];
  let es=[],hasRare=false;
  const isFinal=isBoss&&G.area===3;
  if(isBoss){
    const BOSS_SPD=[3.2*.35,3.2*.45,3.2*.40];
    const bData=[
      {name:'トロール王',   hp:1400,atk:65, xp:300, gold:500, r:40,spd:BOSS_SPD[0],col:'#5a8a30',drawFn:drawTroll,    ability:'slam',    finalBoss:false},
      {name:'深海竜ネッシー',hp:2000,atk:80, xp:600, gold:900, r:44,spd:BOSS_SPD[1],col:'#1a8a5a',drawFn:drawNessie,   ability:'waterball',finalBoss:false},
      {name:'虚無の覇王',   hp:4000,atk:110,xp:1200,gold:2000,r:52,spd:BOSS_SPD[2],col:'#6a1a90',drawFn:null,         ability:'deathzone',finalBoss:true},
    ];
    const bd=bData[G.area-1];
    const hm=(1+(G.floor-1)*.05)*aM;
    const ng=G.ng||1;
    const ngBossMul=ng>=2?Math.pow(2.2,ng-1):1; // 2周目×2.2、3周目×4.84、4周目×10.6…
    const bossHp=Math.round(bd.hp*hm*ngBossMul);
    es.push({x:cw/2,y:ch*.15,hp:bossHp,maxHp:bossHp,atk:Math.round(bd.atk*(1+(G.floor-1)*.04)*aM*ngBossMul),xp:bd.xp,gold:bd.gold,r:bd.r,spd:bd.spd,col:bd.col,name:bd.name+(ng>=2?' 【強】':''),drawFn:bd.drawFn,isBoss:true,ability:bd.ability,flash:0,hitTimer:0,spTimer:160,burnTimer:0,slowTimer:0,finalBoss:bd.finalBoss,rare:false});
  } else {
    const res=buildEnemyList(cnt,aM);es=res.es;hasRare=res.hasRare;

  G.battle={px:cw/2,py:ch/2,enemies:es,dnums:[],projs:[],walls:[],deathZones:[],warnZones:[],atkZones:[],explosions:[],realmZones:[],mordeQZones:[],mordeQWarn:[],mordeEWarn:null,lineSweeps:[],isBoss,finalPhase:isFinal?1:0,hasRare,rareTimer:hasRare?480:0,rareTimerMax:480};
  updatePhase();startBGM(isFinal?'finalBoss':isBoss?'boss':'battle');
  log((isBoss?'👑 ボス':'⚔')+' 戦闘！','le');
  if(hasRare)log('✨ レアモンスター出現！','lb');
}

function updateBattle(){
  const b=G.battle;if(!b||G.paused)return;
  G.tick++;
  if(G.playerFlash>0)G.playerFlash--;
  if(G.shieldCD>0)G.shieldCD--;
  if(G.abilities.includes('shield')&&G.shieldTimer<=0&&G.shieldCD<=0)G.shieldTimer=1800;
  if(G.ghostTimer>0)G.ghostTimer--;if(G.ghostCD>0)G.ghostCD--;
  if(G.abilities.includes('arrow')){
    G.arrowTimer=(G.arrowTimer||0)+1;
    if(G.arrowTimer>=G.arrowInterval&&b.enemies.length>0){
      G.arrowTimer=0;
      const non=b.enemies.filter(e=>!e.rare);
      if(non.length){const target=non.reduce((a,e)=>Math.hypot(e.x-b.px,e.y-b.py)<Math.hypot(a.x-b.px,a.y-b.py)?e:a);const dx=target.x-b.px,dy=target.y-b.py,dist=Math.hypot(dx,dy);b.projs.push({x:b.px,y:b.py,vx:dx/dist*6,vy:dy/dist*6,r:5,dmg:Math.round((G.atk+G.upgAtk*8)*.5*(1+(G.abilityLv.arrow||0)*.2)),life:150,col:'#88ff88',friendly:true,name:'自動矢'});}
    }
  }
  const w=G.weapons[G.sel];
  if(w.special==='autoshot'&&b.enemies.length>0){
    G.autoShotTimer=(G.autoShotTimer||0)+1;
    if(G.autoShotTimer>=G.autoShotInterval){

const _fbBase=`https://firestore.googleapis.com/v1/projects/${_fbConfig.projectId}/databases/(default)/documents`;

async function loadRanking(){
  try{
    const r=await fetch(`${_fbBase}/ranking?orderBy=score&pageSize=30`);
    if(!r.ok)return[];
    const json=await r.json();
    if(!json.documents)return[];
    return json.documents.map(d=>{
      const f=d.fields||{};
      return{
        name:f.name?.stringValue||'名無し',
        record:f.record?.stringValue||'',
        score:Number(f.score?.integerValue||f.score?.doubleValue||0),
        gold:Number(f.gold?.integerValue||f.gold?.doubleValue||0),
        date:f.date?.stringValue||'',
      };
    }).sort((a,b)=>b.score-a.score);
  }catch(e){return[];}
}

      gold:{integerValue:String(Math.round(entry.gold||0))},
      date:{stringValue:new Date().toLocaleDateString('ja-JP')},
    }};
    const r=await fetch(`${_fbBase}/ranking`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body),
    });
    return r.ok?{ok:true}:{ok:false};
  }catch(e){return{ok:false};}
}

function updateMermaidBattle(b){
  const e=b.enemies[0];if(!e)return;
  G.tick++;

  // プレイヤー移動（魅了中は反転）
  const spd=3.2;let vx=0,vy=0;
  const bk2={w:bk.w,s:bk.s,a:bk.a,d:bk.d};
  if(G.charmed){if(bk2.w){vy=spd;}else if(bk2.s){vy=-spd;}if(bk2.a){vx=spd;}else if(bk2.d){vx=-spd;}}
  else{if(bk2.w)vy=-spd;if(bk2.s)vy=spd;if(bk2.a)vx=-spd;if(bk2.d)vx=spd;}
  b.px=Math.max(20,Math.min(cw-20,b.px+vx));
  b.py=Math.max(20,Math.min(ch-20,b.py+vy));

  e.flash=Math.max(0,e.flash-1);
  if(e.hitTimer>0)e.hitTimer--;
  if(e.spTimer>0)e.spTimer--;
  if(e.mermaidHealCd>0)e.mermaidHealCd--;
  if(b.minionCd>0)b.minionCd--;

  // ── 津波ステージギミック ──
  b.tsunamiTimer--;
  if(b.tsunamiTimer<=0){
    // 次の津波を生成
    const dir=b.tsunamiDir;
    const startX=dir>0?-80:cw+80;
    const speed=dir>0?7:-7;
    // 上下に分割した複数の波（Y位置ずらし）
    const numWaves=3;
    for(let i=0;i<numWaves;i++){
      const yBase=ch*(0.2+i*0.28);
      const height=ch*0.22;
      b.tsunamis.push({
        x:startX, y:yBase-height/2,
        w:140, h:height,
        vx:speed, life:Math.ceil((cw+200)/Math.abs(speed))+10,
        dir, phase:i, // phaseで波の位相をずらす
        dmg:55, hitCooldown:{},
      });
    }
    b.tsunamiDir*=-1;
    b.tsunamiTimer=rnd(240,360); // 4〜6秒ごと
    // 津波SE
    tone(110,'sine',.12,AC.currentTime,.3);
    tone(88,'sine',.10,AC.currentTime+.15,.3);
    log('🌊 津波！','lb');showSub('🌊 津波！');
  }

  // 津波の更新・プレイヤー当たり判定
  b.tsunamis=b.tsunamis||[];
  b.tsunamis.forEach(tw=>{
    tw.x+=tw.vx;tw.life--;
    // プレイヤーとの当たり判定（1秒に1回）
    const px=b.px,py=b.py;
    if(px>tw.x&&px<tw.x+tw.w&&py>tw.y&&py<tw.y+tw.h){
      const key='hit';
      tw.hitCooldown[key]=(tw.hitCooldown[key]||0)-1;
      if(tw.hitCooldown[key]<=0){
        takeDamage(tw.dmg,'津波');
        tw.hitCooldown[key]=60;
      }
    }
  });
  b.tsunamis=b.tsunamis.filter(tw=>tw.life>0);
  // プレイヤー状態更新（通常戦闘と同じ）
  if(G.playerFlash>0)G.playerFlash--;
  if(G.ghostTimer>0)G.ghostTimer--;
  if(G.ghostCD>0)G.ghostCD--;
  if(G.shieldCD>0)G.shieldCD--;
  if(G.cd>0)G.cd--;

  // スキル発動
  if(e.spTimer<=0){
    e.spTimer=rnd(42,60);
    // 召喚CD中でなければ召喚優先（50%）、魅了20%、回復30%
    const roll=Math.random();
    if(roll<0.5&&b.minionCd<=0) mermaidSpawnMinions(e,b);
    else if(roll<0.7) mermaidCharm(e,b);
    else mermaidHeal(e,b);
  }

  // ミニオン（b.enemiesに統合済み）の移動・接触ダメージ
  b.enemies.forEach(m=>{
    if(m.isMermaid||m.hp<=0)return; // Mermaid本体はスキップ
    m.flash=Math.max(0,m.flash-1);
    if(m.hitTimer>0){m.hitTimer--;return;}
    const dx=b.px-m.x,dy=b.py-m.y,dist=Math.hypot(dx,dy);
    if(dist>0){m.x+=dx/dist*m.spd;m.y+=dy/dist*m.spd;}
    if(dist<m.r+16&&m.hitTimer<=0){takeDamage(Math.round(m.atk*(.8+Math.random()*.4)),m.name);m.hitTimer=60;}
  });
  b.enemies=b.enemies.filter(e=>e.hp>0||e.isMermaid);

  // 弾の更新
  b.projs=b.projs.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(!p.friendly){if(Math.hypot(p.x-b.px,p.y-b.py)<p.r+14){takeDamage(p.dmg,p.name||'弾');return false;}}
    return p.life>0&&p.x>0&&p.x<cw&&p.y>0&&p.y<ch;
  });

  // lineSweepの更新
  b.lineSweeps=b.lineSweeps||[];
  b.lineSweeps.forEach(ls=>{ls.life--;if(!ls.warn&&Math.abs((b.px-(ls.x1+ls.x2)/2))<ls.w/2+14&&Math.abs((b.py-(ls.y1+ls.y2)/2))<Math.max(Math.abs(ls.y2-ls.y1)/2+ls.w/2,ls.w/2)+14){const dl=ptLineDist({x:b.px,y:b.py},{x:ls.x1,y:ls.y1},{x:ls.x2,y:ls.y2});if(dl<ls.w/2+14&&!ls.hit){ls.hit=true;takeDamage(ls.dmg,ls.name||'攻撃');}}if(ls.warn&&ls.life<ls.maxLife/2)ls.warn=false;});
  b.lineSweeps=b.lineSweeps.filter(ls=>ls.life>0);

  // 魅了エフェクト減衰
  if(b.charmedVisual>0)b.charmedVisual--;

  if(e.hp<=0){endMermaidBattle(true);}
}

function mermaidCharm(e,b){
  // セラフィーンR：魅了→WASD反転（8秒）
  log('💕 魅惑の歌！WASD反転！','lb');showSub('💕 魅惑の歌！');
  G.charmed=true;G.charmedTimer=60*8; // 8秒
  b.charmedVisual=60*8;
  // ハート弾を全方位に
  for(let i=0;i<8;i++){const a=(Math.PI*2/8)*i;b.projs.push({x:e.x,y:e.y,vx:Math.cos(a)*3.5,vy:Math.sin(a)*3.5,r:10,dmg:40,life:160,col:'#ff66aa',name:'魅惑弾'});}
  // きれいなSE
  [659,784,880,1046,1319].forEach((f,i)=>tone(f,'sine',.08,AC.currentTime+i*.1,.25));
  tone(1319,'sine',.05,AC.currentTime+.6,.5);
}

function mermaidSpawnMinions(e,b){
  b.minionCd=240;
  log('🌊 眷属召喚！','lb');showSub('🌊 眷属を呼んだ！');
  const aM=AREA_SCALE[G.area-1];
  const hm=(1+G.floor*.1)*aM;
  const pool=[0,1,2,3,4,5];
  const count=b.minionSpawned?5:10;
  b.minionSpawned=true;
  for(let i=0;i<count;i++){
    const a=(Math.PI*2/count)*i;
    const dist=110+Math.random()*60;
    const ti=pool[Math.floor(Math.random()*pool.length)];
    const t=E_TYPES[ti];
    b.enemies.push({
      x:e.x+Math.cos(a)*dist, y:e.y+Math.sin(a)*dist,
      hp:Math.round(t.hp*hm), maxHp:Math.round(t.hp*hm),
      atk:Math.round(t.atk*(1+G.floor*.07)*aM),
      xp:t.xp, gold:t.gold,
      r:Math.round(t.r*1.5), spd:t.spd, col:t.col, name:t.name,
      ti, flash:0, hitTimer:0, spTimer:rnd(80,180),
      burnTimer:0, slowTimer:0, rare:false,
      isMinionOf:'mermaid',
    });
  }
  [262,330,392].forEach((f,i)=>tone(f,'sawtooth',.08,AC.currentTime+i*.1,.2));
}

function mermaidHeal(e,b){
  // HP1/5回復
  if(e.mermaidHealCd>0)return;
  const heal=Math.round(e.maxHp/5);
  e.hp=Math.min(e.maxHp,e.hp+heal);
  e.mermaidHealCd=300;
  log('💚 Mermaidが回復！+'+heal,'lb');showSub('💚 Mermaidが歌で回復！');
  b.dnums=b.dnums||[];
  b.dnums.push({x:e.x,y:e.y-e.r-10,text:'+'+heal,life:50,big:true});
  [523,659,784,880].forEach((f,i)=>tone(f,'sine',.06,AC.currentTime+i*.1,.2));
}

function endMermaidBattle(win){
  stopBGM();
  // 退避した武器を戻す
  if(G.mermaidSavedWeapons){
    G.mermaidSavedWeapons.forEach(w=>{if(G.weapons.length<3)G.weapons.push(w);});
    G.mermaidSavedWeapons=null;
  }
  G.sel=Math.min(G.sel,G.weapons.length-1);
  G.cdMax=calcCT(G.weapons[G.sel]);
  renderWList();
  G.charmed=false;G.charmedTimer=0;
  if(win){
    G.mermaidDefeated=true;
    G.phase='map';G.battle=null;G.trail=[];G.drawing=false;
    // 棒きれ進化チェック（Mermaid討伐 & 200体達成で進化）
    
    const bokireW=G.weapons.find(w=>w.isBokire&&!w.isUR);
    if(bokireW&&G.bokireKills>=200&&G.mermaidDefeated)evolveBokire(bokireW);
    else renderWList();
    G.xp+=800;lvUp();G.gold+=1500;
    log('🧜 Mermaid撃破！棒きれ経験+50！','le');showCombo('Mermaid 討伐！');
    updatePhase();startBGM('map');
    // 勝利SE
    [523,659,784,880,1046,1319].forEach((f,i)=>tone(f,'sine',.08,AC.currentTime+i*.09,.2));
  } else {
    die();
  }
}

// Mermaid戦でのdoAttack適用のため、戦闘中のtakeDamageをMermaidミニオンにも当てる
function doAttackMermaid(b){
  if(G.trail.length<2){G.trail=[];return;}
  const w=G.weapons[G.sel];let hit=[];
  const ba=G.atk+getAtk(w);
  // Mermaid本体への攻撃（棒きれのみ有効）
  const e=b.enemies[0];
  if(e&&w.isBokire){
    for(let i=1;i<G.trail.length;i++){
      if(ptSeg({x:e.x,y:e.y},G.trail[i-1],G.trail[i])<e.r+getThick(w)*.55){hit.push(e);break;}
    }
  } else if(e&&!w.isBokire){
    b.dnums=b.dnums||[];
    b.dnums.push({x:e.x,y:e.y-e.r-10,text:'無効！',life:40,big:false});
  }
  // ミニオンへの攻撃（全武器有効）
  b.enemies.forEach(m=>{
    if(m.isMermaid||m.hp<=0)return;
    for(let i=1;i<G.trail.length;i++){
      if(ptSeg({x:m.x,y:m.y},G.trail[i-1],G.trail[i])<m.r+getThick(w)*.55){
        const d=rnd(Math.round(ba*.85),Math.round(ba*1.2));
        m.hp-=d;m.flash=10;
        b.dnums=b.dnums||[];
        b.dnums.push({x:m.x,y:m.y-m.r-6,text:'-'+d,life:30,big:false});
        break;
      }
    }
  });
  if(hit.length>0){
    let d=rnd(Math.round(ba*.85),Math.round(ba*1.2));
    e.hp-=d;e.flash=15;
    b.dnums=b.dnums||[];
    b.dnums.push({x:e.x+(Math.random()-.5)*28,y:e.y-e.r-8,text:'-'+d,life:40,big:false});
    sndHit(1);
    if(e.hp<=0){G.trail=[];endMermaidBattle(true);return;}
  } else if(hit.length===0&&!G.trail.length<2){sndHit(1);}
  G.drawing=false;
  G.cd=G.cdMax;
  setTimeout(()=>{G.trail=[];},380);
}

function drawMermaidBattle(b){
  ctx2.clearRect(0,0,cw,ch);
  // 背景：深海グラデーション
  const bg=ctx2.createLinearGradient(0,0,0,ch);
  bg.addColorStop(0,'#000a18');bg.addColorStop(1,'#001a2a');
  ctx2.fillStyle=bg;ctx2.fillRect(0,0,cw,ch);
  // 泡エフェクト
  for(let i=0;i<12;i++){
    const bx=((G.tick*.7+i*137)%cw);
    const by=ch-(((G.tick*1.2+i*89)%(ch+40)));
    ctx2.beginPath();ctx2.arc(bx,by,2+i%4,0,Math.PI*2);
    ctx2.fillStyle=`rgba(100,220,255,${0.1+0.05*(i%3)})`;ctx2.fill();
  }

  const e=b.enemies[0];
  if(!e)return;

  // 魅了エフェクト（ハートとピンクオーラ）
  if(b.charmedVisual>0){
    const al=Math.min(1,b.charmedVisual/60);
    ctx2.fillStyle=`rgba(255,100,180,${al*.12+.06*Math.sin(G.tick*.15)})`;
    ctx2.fillRect(0,0,cw,ch);
    // ♥散布
    for(let i=0;i<6;i++){
      const hx=((G.tick*1.5+i*cw/6+50)%cw);
      const hy=((G.tick*0.8+i*ch/6+30)%ch);
      ctx2.fillStyle=`rgba(255,80,160,${al*.5})`;
      ctx2.font='18px monospace';ctx2.textAlign='center';ctx2.textBaseline='middle';
      ctx2.fillText('♥',hx,hy);
    }
    // 画面下部に「魅了中！WASD反転」
    ctx2.fillStyle=`rgba(255,100,180,${al*.85})`;
    ctx2.font='bold 14px monospace';ctx2.textAlign='center';ctx2.textBaseline='middle';
    ctx2.fillText('💕 魅惑の歌！WASD反転中',cw/2,ch-22);
  }

  // ── 津波描画 ──
  (b.tsunamis||[]).forEach(tw=>{
    const al=Math.min(1, tw.life/20); // フェードアウト
    // 波本体
    ctx2.save();
    ctx2.globalAlpha=0.75*al;
    // 波のグラデーション
    const grad=ctx2.createLinearGradient(tw.x,0,tw.x+tw.w,0);
    if(tw.dir>0){
      grad.addColorStop(0,'rgba(0,180,255,0)');
      grad.addColorStop(0.3,'rgba(0,200,255,0.9)');
      grad.addColorStop(1,'rgba(100,230,255,0.6)');
    } else {
      grad.addColorStop(0,'rgba(100,230,255,0.6)');
      grad.addColorStop(0.7,'rgba(0,200,255,0.9)');
      grad.addColorStop(1,'rgba(0,180,255,0)');
    }
    // 波の上辺をsin波で揺らす
    ctx2.beginPath();
    ctx2.moveTo(tw.x, tw.y+tw.h);
    ctx2.lineTo(tw.x+tw.w, tw.y+tw.h);
    for(let px2=tw.x+tw.w;px2>=tw.x;px2-=8){
      const wave=Math.sin((px2+G.tick*3)*0.05+tw.phase*2)*8;
      ctx2.lineTo(px2, tw.y+wave);
    }
    ctx2.closePath();
    ctx2.fillStyle=grad;
    ctx2.fill();
    // 波頭の白い泡
    ctx2.strokeStyle=`rgba(200,240,255,${0.8*al})`;
    ctx2.lineWidth=3;
    ctx2.beginPath();
    for(let px2=tw.x;px2<=tw.x+tw.w;px2+=8){
      const wave=Math.sin((px2+G.tick*3)*0.05+tw.phase*2)*8;
      if(px2===tw.x)ctx2.moveTo(px2,tw.y+wave);
      else ctx2.lineTo(px2,tw.y+wave);
    }
    ctx2.stroke();
    ctx2.restore();
    // 警告マーカー（画面端）
    if(tw.x>-80&&tw.x<cw+80){
      const ex=tw.dir>0?0:cw;
      ctx2.fillStyle=`rgba(0,200,255,${0.5*al+0.3*Math.sin(G.tick*.2)})`;
      ctx2.font='bold 13px monospace';
      ctx2.textAlign=tw.dir>0?'left':'right';
      ctx2.textBaseline='middle';
      ctx2.fillText('🌊',ex+(tw.dir>0?4:-4),tw.y+tw.h/2);
    }
  });
  b.enemies.forEach(m=>{
    if(m.isMermaid||m.hp<=0)return;
    const imgKey=['slime','bat','goblin','skeleton','demon','dragon','ghost','mini_troll','mini_nessie'][m.ti]||'slime';
    drawWithImg(imgKey,()=>{
      ctx2.fillStyle=m.flash>0?'#fff':m.col;
      ctx2.beginPath();ctx2.arc(m.x,m.y,m.r,0,Math.PI*2);ctx2.fill();
    },ctx2,m.x,m.y,m.r,m.col,m.flash>0);
    // HPバー
    const bw=m.r*2,bh=4,bx=m.x-m.r,by2=m.y-m.r-8;
    ctx2.fillStyle='#333';ctx2.fillRect(bx,by2,bw,bh);
    ctx2.fillStyle=m.col;ctx2.fillRect(bx,by2,bw*(m.hp/m.maxHp),bh);
  });

  // 弾の描画
  b.projs.forEach(p=>{
    ctx2.beginPath();ctx2.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx2.fillStyle=p.col||'#ff66aa';
    ctx2.shadowColor=p.col||'#ff66aa';ctx2.shadowBlur=8;
    ctx2.fill();ctx2.shadowBlur=0;
  });

  // lineSweeps
  (b.lineSweeps||[]).forEach(ls=>{
    const al=ls.life/ls.maxLife;
    ctx2.strokeStyle=ls.warn?`rgba(255,200,100,${al*.7})`:`rgba(0,220,255,${al})`;
    ctx2.lineWidth=ls.w*al;ctx2.lineCap='round';
    ctx2.beginPath();ctx2.moveTo(ls.x1,ls.y1);ctx2.lineTo(ls.x2,ls.y2);ctx2.stroke();
  });

  // Mermaid本体
  const mimg=IMGS['mermaid'];
  const mAura=ctx2.createRadialGradient(e.x,e.y,e.r*.2,e.x,e.y,e.r*2.2);
  mAura.addColorStop(0,`rgba(0,220,255,${0.15+0.08*Math.sin(G.tick*.08)})`);
  mAura.addColorStop(1,'rgba(0,100,180,0)');
  ctx2.beginPath();ctx2.arc(e.x,e.y,e.r*2.2,0,Math.PI*2);
  ctx2.fillStyle=mAura;ctx2.fill();
  if(mimg&&mimg.complete){
    const sz=e.r*2.6;
    ctx2.save();
    if(e.flash>0){ctx2.globalAlpha=0.6;ctx2.filter='brightness(3)';}
    ctx2.drawImage(mimg,e.x-sz/2,e.y-sz/2,sz,sz);
    ctx2.restore();
  } else {
    ctx2.beginPath();ctx2.arc(e.x,e.y,e.r,0,Math.PI*2);
    ctx2.fillStyle=e.flash>0?'#fff':'#00cccc';ctx2.fill();
  }
  // Mermaid HPバー
  const bw=e.r*3,bh=8,bx=e.x-e.r*1.5,by2=e.y-e.r-22;
  ctx2.fillStyle='#21262d';ctx2.fillRect(bx,by2,bw,bh);
  const hpRatio=e.hp/e.maxHp;
  ctx2.fillStyle=hpRatio>.5?'#00cccc':'#ff6699';
  ctx2.fillRect(bx,by2,bw*hpRatio,bh);
  ctx2.font='bold 11px monospace';ctx2.textAlign='center';ctx2.textBaseline='middle';
  ctx2.fillStyle='#aaffee';ctx2.fillText('🧜 '+e.name,e.x,by2-8);

  // 攻撃範囲円
  ctx2.strokeStyle=G.cd===0?'rgba(80,200,80,.25)':'rgba(80,80,80,.15)';
  ctx2.lineWidth=1.5;ctx2.setLineDash([3,3]);
  ctx2.beginPath();ctx2.arc(b.px,b.py,getRange(),0,Math.PI*2);ctx2.stroke();
  ctx2.setLineDash([]);

  // 軌跡
  if(G.trail.length>=2){
    const tw=G.weapons[G.sel];
    ctx2.strokeStyle=tw.col||'#aaa';
    ctx2.lineWidth=getThick(tw);ctx2.lineCap='round';ctx2.lineJoin='round';
    ctx2.globalAlpha=.8;
    ctx2.beginPath();ctx2.moveTo(G.trail[0].x,G.trail[0].y);
    for(let i=1;i<G.trail.length;i++)ctx2.lineTo(G.trail[i].x,G.trail[i].y);
    ctx2.stroke();
    ctx2.globalAlpha=.25;ctx2.lineWidth=getThick(tw)*2.5;
    ctx2.beginPath();ctx2.moveTo(G.trail[0].x,G.trail[0].y);
    for(let i=1;i<G.trail.length;i++)ctx2.lineTo(G.trail[i].x,G.trail[i].y);
    ctx2.stroke();ctx2.globalAlpha=1;
  }

  // プレイヤー
  if(IMGS['player']){
    const sp=getCachedSprite('player',120);
    if(sp)ctx2.drawImage(sp,b.px-60,b.py-72,120,144);
    else ctx2.drawImage(IMGS['player'],b.px-60,b.py-72,120,144);
  } else drawStick(ctx2,b.px,b.py,26,G.cd===0,G.playerFlash>0);

  // ダメージ数値
  b.dnums=b.dnums||[];
  b.dnums.forEach(d=>{
    d.life--;
    ctx2.font=(d.big?'bold 16px':'12px')+' monospace';
    ctx2.textAlign='center';ctx2.textBaseline='middle';
    ctx2.fillStyle=d.text&&d.text[0]==='+`'?'#44ff88':`rgba(255,220,80,${d.life/40})`;
    ctx2.fillStyle=d.text&&String(d.text).startsWith('+')?`rgba(100,255,160,${d.life/40})`:`rgba(255,220,80,${d.life/40})`;
    ctx2.fillText(d.text,d.x,d.y-=(d.big?.6:.4));
  });
  b.dnums=b.dnums.filter(d=>d.life>0);

  // CT円
  if(G.cd>0){const p=1-G.cd/G.cdMax;ctx2.strokeStyle='rgba(80,200,255,.5)';ctx2.lineWidth=3;ctx2.beginPath();ctx2.arc(b.px,b.py,30,-.5*Math.PI,-.5*Math.PI+p*Math.PI*2);ctx2.stroke();}
}
