function updateZarcaelBattle(b){
  const e=b.enemies[0];if(!e)return;
  G.tick++;
  if(G.playerFlash>0)G.playerFlash--;
  if(G.shieldCD>0)G.shieldCD--;
  if(G.abilities.includes('shield')&&G.shieldTimer<=0&&G.shieldCD<=0)G.shieldTimer=1800;
  if(G.ghostTimer>0)G.ghostTimer--;if(G.ghostCD>0)G.ghostCD--;
  // 通常能力
  if(G.abilities.includes('arrow')){
    G.arrowTimer=(G.arrowTimer||0)+1;
    if(G.arrowTimer>=G.arrowInterval){G.arrowTimer=0;const dx=e.x-b.px,dy=e.y-b.py,dist=Math.hypot(dx,dy);b.projs.push({x:b.px,y:b.py,vx:dx/dist*6,vy:dy/dist*6,r:5,dmg:Math.round((G.atk+G.upgAtk*8)*.5*(1+(G.abilityLv.arrow||0)*.2)),life:150,col:'#88ff88',friendly:true,name:'自動矢'});}
  }
  if(G.abilities.includes('regen')){G.regenTimer=(G.regenTimer||0)+1;const iv=Math.max(180,600-(G.abilityLv.regen||0)*12);if(G.regenTimer>=iv){G.regenTimer=0;G.hp=Math.min(G.maxHp,G.hp+Math.max(1,Math.round(G.maxHp*(.02+(G.abilityLv.regen||0)*.01))));}}
  if(G.abilities.includes('beam')){
    G.beamCD=(G.beamCD||0);if(G.beamCD>0)G.beamCD--;
    if(G.beamActive){G.beamActive.life--;if(G.beamActive.life<=0)G.beamActive=null;else if(G.tick%10===0){const bm=G.beamActive;const dx=bm.tx-bm.sx,dy=bm.ty-bm.sy,len=Math.hypot(dx,dy);if(len>0){const t2=Math.max(0,Math.min(1,((e.x-bm.sx)*dx+(e.y-bm.sy)*dy)/(len*len)));const cx2=bm.sx+t2*dx,cy2=bm.sy+t2*dy;if(Math.hypot(e.x-cx2,e.y-cy2)<e.r+12){const bd=Math.round(getAtk(G.weapons[G.sel])*(1+(G.abilityLv.beam||0)*.1));e.hp-=bd;e.flash=6;b.dnums.push({x:e.x,y:e.y-e.r-6,text:'-'+bd,life:30,big:true});}}}}
    if(G.beamCD<=0&&!G.beamActive){const dist=Math.hypot(e.x-b.px,e.y-b.py);if(dist<=250+(G.abilityLv.beam||0)*50){G.beamActive={sx:b.px,sy:b.py,tx:e.x,ty:e.y,life:30,maxLife:30};G.beamCD=G.beamCDMax||480;tone(660,'sine',.05,AC.currentTime,.08);}}
  }
  // プレイヤー移動
  const spd=3.2;let vx=0,vy=0;
  if(bk.w)vy=-spd;if(bk.s)vy=spd;if(bk.a)vx=-spd;if(bk.d)vx=spd;
  b.px=Math.max(20,Math.min(cw-20,b.px+vx));
  b.py=Math.max(20,Math.min(ch-20,b.py+vy));

  e.flash=Math.max(0,e.flash-1);
  const spdMul=e.slowTimer>0?.5:1;

  // ガレンE: ウィンドアップ待機中
  if(e.zChargePending){
    e.zChargePending.timer--;
    if(e.zChargePending.timer<=0){
      // ウィンドアップ終了 → 突進開始
      const p=e.zChargePending;e.zChargePending=null;
      e.zCharging=true;
      const spd=18; // 高速突進
      e.zChargeVx=p.nx*spd;e.zChargeVy=p.ny*spd;
      // 突進距離をカウント用に保持
      e.zChargeDist=0;e.zChargeMax=p.chargeLen;
      // 突進スラッシュ: ダメージ線を3本追加(実際の位置から)
      [-1,0,1].forEach(offset=>{
        const perpX=-p.ny*offset*28,perpY=p.nx*offset*28;
        (b.zTrailAtks=b.zTrailAtks||[]).push({
          x1:e.x+perpX,y1:e.y+perpY,
          x2:e.x+perpX+p.nx*p.chargeLen,y2:e.y+perpY+p.ny*p.chargeLen,
          life:22,maxLife:22,triggered:false,dmg:Math.round(e.atk*(offset===0?2.2:1.5)),
          isCharge:true,
        });
      });
      b.zChargeWarn=[];
      tone(100,'sawtooth',.18,AC.currentTime,.04);tone(80,'sawtooth',.14,AC.currentTime+.05,.06);
      sndMordeE();
    }
  }
  // 突進中の処理
  if(e.zCharging){
    const mv=Math.hypot(e.zChargeVx,e.zChargeVy);
    e.x+=e.zChargeVx*spdMul;e.y+=e.zChargeVy*spdMul;
    e.zChargeDist=(e.zChargeDist||0)+mv;
    // 突進中にプレイヤーに接触したらダメージ
    if(Math.hypot(e.x-b.px,e.y-b.py)<e.r+22&&e.hitTimer<=0){
      takeDamage(Math.round(e.atk*2.0),'突進斬激');e.hitTimer=25;
    }
    if(e.zChargeDist>=(e.zChargeMax||cw*.7)||e.x<e.r||e.x>cw-e.r||e.y<e.r||e.y>ch-e.r){
      e.zCharging=false;
      e.x=Math.max(e.r+20,Math.min(cw-e.r-20,e.x));
      e.y=Math.max(e.r+20,Math.min(ch-e.r-20,e.y));
    }
  } else if(!e.zChargePending) {
    // 通常追尾
    const dx=b.px-e.x,dy=b.py-e.y,dist=Math.hypot(dx,dy);
    if(dist>0){e.x+=dx/dist*e.spd*spdMul;e.y+=dy/dist*e.spd*spdMul;}
    if(dist<e.r+16&&e.hitTimer<=0){takeDamage(Math.round(e.atk*(.8+Math.random()*.4)),e.name);e.hitTimer=60;}
  } // end else(通常追尾)
  if(e.hitTimer>0)e.hitTimer--;
  if(e.spTimer>0)e.spTimer--;
  if(e.burnTimer>0){e.burnTimer--;if(!e.zEnragedDialogue&&G.tick%60===0){const bd=Math.round((G.atk+G.upgAtk*8)*.3);e.hp-=bd;e.flash=6;b.dnums.push({x:e.x,y:e.y-e.r-6,text:'-'+bd,life:30,big:false});}}
  if(e.slowTimer>0)e.slowTimer--;

  // バリア
  if(e.zBarrier>0&&e.burnTimer>0)e.zBarrier=Math.max(0,e.zBarrier-2);

  // ── 激怒発動チェック（HP3割以下・未発動時のみ） ──
  if(!e.zEnraged&&e.hp/e.maxHp<0.3){
    e.zEnraged=true;
    e.zEnragedDialogue=true;   // 台詞中はスキル封印
    e.hp=e.maxHp;
    e.zBarrier=0;
    e.spd=2.4;
    e.flash=40;
    // 全方位弾（爆発エフェクトはb.explosionsではなく専用）
    for(let i=0;i<16;i++){const a=(Math.PI*2/16)*i;b.projs.push({x:e.x,y:e.y,vx:Math.cos(a)*5,vy:Math.sin(a)*5,r:11,dmg:120,life:130,col:'#ff2200',name:'天罰波'});}
    b.zEnrageFlash={x:e.x,y:e.y,r:0,maxR:220,life:35,maxLife:35}; // 専用フラッシュエフェクト
    // 台詞（showSubを延長版で管理、スキルに上書きされないよう封印付き）
    const lines=[
      '——貴様、よくぞここまで辿り着いた。',
      'だが……これで終わりだ。',
      '天よ、今こそ真の裁きを！',
      '⚡ ザルカエル、真の覚醒！',
    ];
    lines.forEach((line,i)=>{
      setTimeout(()=>{
        log('👁 '+line,'lb');
        // showSubを直接延長表示
        const el=document.getElementById('sub-disp');
        el.textContent=line;el.style.opacity=1;
        clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity=0,1200);
        if(i===lines.length-1&&e){e.zEnragedDialogue=false;e.spTimer=10;} // 最後の台詞後に解禁
      },i*1500);
    });
    // SE
    for(let i=0;i<8;i++)tone(80-i*5,'sawtooth',.16,AC.currentTime+i*.15,.4);
    for(let i=0;i<5;i++)tone(440+i*110,'sine',.09,AC.currentTime+1.2+i*.18,.3);
  }

  // スキル発動
  if(e.spTimer<=0&&!e.zCharging&&!e.zChargePending&&!e.zEnragedDialogue){
    e.spTimer=e.zEnraged?rnd(45,70):rnd(80,130);
    const skill=Math.floor(Math.random()*4);
    if(skill===0) zSkillCharge(e,b);
    else if(skill===1) zSkillCross(e,b);
    else if(skill===2) zSkillBarrier(e);
    else if(!b.holyRing||b.holyRing.phase==='done') zSkillHolyRing(e,b);
    else zSkillCross(e,b); // 聖環使用中は代わりにクロス
  }

  // クロス警告→攻撃
  b.zCrossWarn=b.zCrossWarn||[];b.zCrossAtk=b.zCrossAtk||[];
  b.zCrossWarn.forEach(w=>{w.life--;});
  b.zCrossWarn.filter(w=>w.life<=0).forEach(w=>{
    // 警告終了 → 実ダメージ線に変換
    const dirs=[[1,0],[-1,0],[0,1],[0,-1],[.707,.707],[-.707,.707],[.707,-.707],[-.707,-.707]];
    dirs.forEach(([dx,dy])=>{
      const len=Math.max(cw,ch)*1.2;
      b.zCrossAtk.push({x1:w.x,y1:w.y,x2:w.x+dx*len,y2:w.y+dy*len,life:35,maxLife:35,triggered:false,dmg:w.dmg});
    });
  });
  b.zCrossWarn=b.zCrossWarn.filter(w=>w.life>0);
  b.zCrossAtk.forEach(a=>{
    a.life--;
    if(!a.triggered){a.triggered=true;if(ptLineDist({x:b.px,y:b.py},{x:a.x1,y:a.y1},{x:a.x2,y:a.y2})<28)takeDamage(a.dmg,'聖断の十字');}
  });
  b.zCrossAtk=b.zCrossAtk.filter(a=>a.life>0);

  // 軌跡攻撃警告→ダメージ
  b.zTrailWarns=b.zTrailWarns||[];b.zTrailAtks=b.zTrailAtks||[];
  b.zTrailWarns.forEach(tw=>{tw.life--;});
  b.zTrailWarns.filter(tw=>tw.life<=0).forEach(tw=>{
    // 警告終了→ダメージ線
    for(let i=1;i<tw.pts.length;i++){
      b.zTrailAtks.push({x1:tw.pts[i-1].x,y1:tw.pts[i-1].y,x2:tw.pts[i].x,y2:tw.pts[i].y,life:40,maxLife:40,triggered:false,dmg:tw.dmg});
    }
  });
  b.zTrailWarns=b.zTrailWarns.filter(tw=>tw.life>0);
  b.zTrailAtks.forEach(ta=>{
    ta.life--;
    if(!ta.triggered){ta.triggered=true;if(ptLineDist({x:b.px,y:b.py},{x:ta.x1,y:ta.y1},{x:ta.x2,y:ta.y2})<30)takeDamage(ta.dmg,'裁きの軌跡');}
  });
  b.zTrailAtks=b.zTrailAtks.filter(ta=>ta.life>0);

  // 弾
  b.projs=b.projs.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.friendly){if(e.zBarrier>0){const barrier=Math.min(p.dmg,e.zBarrier);e.zBarrier-=barrier;const real=p.dmg-barrier;if(real>0){e.hp-=real;e.flash=6;b.dnums.push({x:e.x,y:e.y-e.r,text:'-'+real,life:30,big:false});}b.dnums.push({x:e.x,y:e.y-e.r-14,text:'🛡BLOCK',life:25,big:false});return false;}else{e.hp-=p.dmg;e.flash=10;b.dnums.push({x:e.x,y:e.y-e.r,text:'-'+p.dmg,life:30,big:false});return false;}}
    else{if(Math.hypot(p.x-b.px,p.y-b.py)<p.r+14){takeDamage(p.dmg,p.name||'弾');return false;}}
    return p.life>0&&p.x>0&&p.x<cw&&p.y>0&&p.y<ch;
  });
  b.dnums=b.dnums.filter(d=>{d.y-=.8;d.life--;return d.life>0;});
  if(G.cd>0)G.cd--;
  if(G.beamActive){b.dnums.push({x:e.x,y:e.y-e.r-20,text:'beam',life:1,big:false});}// dummy tick

  // 天罰の聖環 - APEXアンチサークル処理
  if(b.holyRing){
    const hr=b.holyRing;
    if(hr.phase==='shrinking'){
      // 縮小
      hr.shrinkLife--;
      const t=hr.shrinkLife/hr.totalLife;
      hr.r=hr.endR+(hr.startR-hr.endR)*t;
      // プレイヤーが圏外にいたらダメージ(60フレームに1回)
      const dist=Math.hypot(b.px-hr.cx,b.py-hr.cy);
      if(dist>hr.r){
        hr.dmgTick++;
        if(hr.dmgTick>=60){
          hr.dmgTick=0;
          takeDamage(hr.dmgPerTick,'天罰の聖環');
          showSub('🔥 圏外ダメージ！');
        }
      } else {
        hr.dmgTick=Math.max(0,hr.dmgTick-1);
      }
      if(hr.shrinkLife<=0){hr.phase='done';}
    } else {
      // 終了後少し待ってリング消去
      hr.doneTimer=(hr.doneTimer||60)-1;
      if(hr.doneTimer<=0)b.holyRing=null;
    }
  }

  // ザルカエルE: ウィンドアップ警告のzChargeWarn寿命管理
  b.zChargeWarn=b.zChargeWarn||[];
  b.zChargeWarn=b.zChargeWarn.filter(w=>w.life>0);
  b.zChargeWarn.forEach(w=>w.life--);
  // 激怒フラッシュエフェクト更新
  if(b.zEnrageFlash){b.zEnrageFlash.life--;b.zEnrageFlash.r=b.zEnrageFlash.maxR*(1-b.zEnrageFlash.life/b.zEnrageFlash.maxLife);if(b.zEnrageFlash.life<=0)b.zEnrageFlash=null;}

  if(e.hp<=0){endZarkaelBattle();}
}

function zSkillCharge(e,b){
  // ガレンE方式: 予備動作(ウィンドアップ)→プレイヤー現在位置を通り抜ける高速突進
  // 予備動作中は前方にスラッシュ警告マーカーを表示
  log('⚡ 突進斬激！','lb');showSub('⚡ 突進斬激！');
  const dx=b.px-e.x,dy=b.py-e.y,dist=Math.hypot(dx,dy);
  if(dist<=0)return;
  const nx=dx/dist,ny=dy/dist;
  // 予備動作マーカー(60フレーム)：プレイヤー方向にスラッシュ予告線3本
  const windupLife=60;
  const chargeLen=cw*0.7; // 突進距離：画面をほぼ横断
  b.zChargeWarn=b.zChargeWarn||[];
  // 中央・左・右の3本の斬撃予告線
  [-1,0,1].forEach((offset,i)=>{
    const perpX=-ny*offset*28, perpY=nx*offset*28;
    b.zChargeWarn.push({
      x1:e.x+perpX, y1:e.y+perpY,
      x2:e.x+perpX+nx*chargeLen, y2:e.y+perpY+ny*chargeLen,
      life:windupLife, maxLife:windupLife,
      offset,
    });
  });
  // ウィンドアップ終了後に突進開始
  e.zChargePending={nx,ny,chargeLen,windupLife,timer:windupLife};
  tone(220,'square',.08,AC.currentTime,.05);
  tone(330,'square',.07,AC.currentTime+.12,.1);
  tone(440,'square',.06,AC.currentTime+.25,.2);
}
function zSkillCross(e,b){
  log('✚ 聖断の十字！','lb');showSub('✚ 聖断の十字！');
  b.zCrossWarn=b.zCrossWarn||[];
  b.zCrossWarn.push({x:b.px,y:b.py,life:70,maxLife:70,dmg:Math.round(e.atk*2.2)});
  tone(440,'square',.08,AC.currentTime,.06);tone(550,'square',.07,AC.currentTime+.08,.06);
}
function zSkillBarrier(e){
  log('🛡 神聖バリア！','lb');showSub('🛡 神聖バリア！');
  e.zBarrier=e.zBarrierMax;
  sndCircle();
}
// 天罰の聖環 - APEXアンチサークル方式
function zSkillHolyRing(e,b){
  log('☀ 天罰の聖環！','lb');showSub('☀ 天罰の聖環！');
  // 安全地帯(セーフゾーン)が外側から縮まり、外にいるとダメージを受け続ける
  b.holyRing=b.holyRing||null;
  const startR=Math.min(cw,ch)*0.48; // 初期外輪半径（画面ほぼ全体）
  const endR=Math.min(cw,ch)*0.25;   // 最小半径
  const cx=cw/2+( Math.random()-.5)*60; // 中心はやや揺れる
  const cy=ch/2+( Math.random()-.5)*60;
  b.holyRing={
    cx,cy,
    r:startR,         // 現在のセーフゾーン半径
    startR,endR,
    shrinkLife:420,   // 縮小にかける総フレーム数(7秒)
    totalLife:420,
    dmgTick:0,        // ダメージ間隔カウンタ
    dmgPerTick:Math.round(e.atk*0.5), // 圏外1秒ごとのダメージ
    phase:'shrinking', // 'shrinking' or 'done'
  };
  sndCircle();
  tone(880,'sine',.12,AC.currentTime,.2);
  tone(1100,'sine',.08,AC.currentTime+.25,.4);
  tone(660,'triangle',.10,AC.currentTime+.7,.5);
}

function drawZarkaelBattle(b){
  ctx2.clearRect(0,0,cw,ch);
  // 専用背景（蒼い天空）
  const grad=ctx2.createRadialGradient(cw/2,ch/2,0,cw/2,ch/2,Math.max(cw,ch)*.7);
  grad.addColorStop(0,'#000d1f');grad.addColorStop(.5,'#000818');grad.addColorStop(1,'#000410');
  ctx2.fillStyle=grad;ctx2.fillRect(0,0,cw,ch);
  // 星
  for(let i=0;i<30;i++){
    const sx=((i*137+G.tick*.02)%cw);const sy=((i*97)%ch);
    const a=.3+.3*Math.sin(G.tick*.05+i);
    ctx2.fillStyle=`rgba(150,200,255,${a})`;ctx2.beginPath();ctx2.arc(sx,sy,1+i%2,0,Math.PI*2);ctx2.fill();
  }
  // 光柱
  for(let i=0;i<3;i++){
    const lx=cw*(.2+i*.3);
    const lg=ctx2.createLinearGradient(lx,0,lx,ch);
    lg.addColorStop(0,`rgba(50,120,255,${.06+.03*Math.sin(G.tick*.04+i)})`);lg.addColorStop(1,'rgba(0,0,0,0)');
    ctx2.fillStyle=lg;ctx2.fillRect(lx-15,0,30,ch);
  }

  const e=b.enemies[0];if(!e)return;

  // ===== 天罰の聖環 - APEXアンチサークル描画 =====
  if(b.holyRing&&b.holyRing.phase==='shrinking'){
    const hr=b.holyRing;
    const danger=Math.hypot(b.px-hr.cx,b.py-hr.cy)>hr.r;

    // 圏外領域（外側のアンチゾーン）を塗りつぶし
    ctx2.save();
    ctx2.beginPath();
    ctx2.rect(0,0,cw,ch);
    ctx2.arc(hr.cx,hr.cy,hr.r,0,Math.PI*2,true);
    ctx2.fillStyle=`rgba(160,80,0,${0.22+0.10*Math.sin(G.tick*.08)})`;
    ctx2.fill();
    ctx2.restore();

    // セーフゾーン境界線
    const pulseA=0.7+0.3*Math.sin(G.tick*.15);
    ctx2.strokeStyle=danger?`rgba(255,60,0,${pulseA})`:`rgba(255,220,0,${pulseA})`;
    ctx2.lineWidth=danger?5:3;
    if(danger){ctx2.shadowColor='#ff3300';ctx2.shadowBlur=18;}
    ctx2.beginPath();ctx2.arc(hr.cx,hr.cy,hr.r,0,Math.PI*2);ctx2.stroke();
    ctx2.shadowBlur=0;

    // 内側の警告ライン(縮まる様子を2重線で強調)
    ctx2.strokeStyle=`rgba(255,180,0,${0.35*pulseA})`;
    ctx2.lineWidth=12;
    ctx2.setLineDash([20,12]);
    ctx2.beginPath();ctx2.arc(hr.cx,hr.cy,hr.r+12,0,Math.PI*2);ctx2.stroke();
    ctx2.setLineDash([]);

    // 圏外にいるときの警告テキスト
    if(danger){
      ctx2.save();
      ctx2.fillStyle=`rgba(255,100,0,${0.7+0.3*Math.sin(G.tick*.2)})`;
      ctx2.font='bold 16px monospace';
      ctx2.textAlign='center';ctx2.textBaseline='middle';
      ctx2.shadowColor='#ff0000';ctx2.shadowBlur=8;
      ctx2.fillText('⚠ 天罰の圏外！',cw/2,ch-30);
      ctx2.restore();
    }
  }

  // ===== ガレンE 突進警告線描画 =====
  (b.zChargeWarn||[]).forEach(w=>{
    const al=(w.maxLife-w.life)/w.maxLife;
    const blink=Math.sin(G.tick*.35+w.offset)>.0?1:0.3;
    ctx2.strokeStyle=`rgba(255,${Math.round(220-al*100)},50,${(0.3+al*0.55)*blink})`;
    ctx2.lineWidth=3+al*6;
    ctx2.lineCap='round';
    ctx2.setLineDash([16,8]);
    ctx2.beginPath();ctx2.moveTo(w.x1,w.y1);ctx2.lineTo(w.x2,w.y2);ctx2.stroke();
    ctx2.setLineDash([]);
  });

  // クロス警告
  (b.zCrossWarn||[]).forEach(w=>{
    const al=(w.maxLife-w.life)/w.maxLife;
    ctx2.strokeStyle=`rgba(100,180,255,${.3+al*.5})`;ctx2.lineWidth=6+al*8;
    const dirs=[[1,0],[-1,0],[0,1],[0,-1],[.707,.707],[-.707,.707],[.707,-.707],[-.707,-.707]];
    const len=Math.max(cw,ch)*1.2;
    dirs.forEach(([dx,dy])=>{ctx2.beginPath();ctx2.moveTo(w.x,w.y);ctx2.lineTo(w.x+dx*len,w.y+dy*len);ctx2.stroke();});
    ctx2.fillStyle=`rgba(100,180,255,${al*.2})`;ctx2.beginPath();ctx2.arc(w.x,w.y,40+al*20,0,Math.PI*2);ctx2.fill();
  });
  // クロス攻撃
  (b.zCrossAtk||[]).forEach(a=>{
    const al=a.life/a.maxLife;
    ctx2.strokeStyle=`rgba(255,255,255,${al*.9})`;ctx2.lineWidth=18*al;ctx2.lineCap='round';
    ctx2.shadowColor='#88ccff';ctx2.shadowBlur=12*al;
    ctx2.beginPath();ctx2.moveTo(a.x1,a.y1);ctx2.lineTo(a.x2,a.y2);ctx2.stroke();
    ctx2.shadowBlur=0;
  });
  // 軌跡警告
  (b.zTrailWarns||[]).forEach(tw=>{
    const al=.4+.4*(1-tw.life/tw.maxLife);
    ctx2.strokeStyle=`rgba(80,160,255,${al})`;ctx2.lineWidth=10;ctx2.lineCap='round';ctx2.lineJoin='round';
    ctx2.setLineDash([12,6]);
    ctx2.beginPath();ctx2.moveTo(tw.pts[0].x,tw.pts[0].y);
    tw.pts.forEach(p=>ctx2.lineTo(p.x,p.y));ctx2.stroke();
    ctx2.setLineDash([]);
  });
  // 軌跡ダメージ
  // 軌跡ダメージ（突進斬撃も含む）
  (b.zTrailAtks||[]).forEach(ta=>{
    const al=ta.life/ta.maxLife;
    if(ta.isCharge){
      // 突進斬撃: 鋭い白い閃光
      ctx2.strokeStyle=`rgba(255,255,220,${al*.95})`;
      ctx2.lineWidth=(ta.offset===0?8:5)*al;
      ctx2.shadowColor='#ffffff';ctx2.shadowBlur=16*al;
    } else {
      ctx2.strokeStyle=`rgba(200,220,255,${al*.9})`;
      ctx2.lineWidth=14*al;
      ctx2.shadowColor='#3388ff';ctx2.shadowBlur=16*al;
    }
    ctx2.lineCap='round';
    ctx2.beginPath();ctx2.moveTo(ta.x1,ta.y1);ctx2.lineTo(ta.x2,ta.y2);ctx2.stroke();
    ctx2.shadowBlur=0;
  });

  // 弾
  b.projs.forEach(p=>{ctx2.fillStyle=p.col||'#88ccff';ctx2.beginPath();ctx2.arc(p.x,p.y,p.r,0,Math.PI*2);ctx2.fill();});

  // ザルカエル本体
  const imgKey='zarcael';
  if(IMGS[imgKey]){
    if(e.flash>0)ctx2.globalAlpha=0.5;
    const er=e.r*2.5;
    const sp=getCachedSprite(imgKey,Math.ceil(er*2));
    if(sp)ctx2.drawImage(sp,e.x-er,e.y-er,er*2,er*2);
    else ctx2.drawImage(IMGS[imgKey],e.x-er,e.y-er,er*2,er*2);
    if(e.flash>0)ctx2.globalAlpha=1;
  } else {
    // 激怒フラッシュエフェクト（爆発の代わり）
    if(b.zEnrageFlash){
      const ef=b.zEnrageFlash;
      const al=ef.life/ef.maxLife;
      ctx2.beginPath();ctx2.arc(ef.x,ef.y,ef.r,0,Math.PI*2);
      ctx2.fillStyle=`rgba(255,60,0,${al*0.45})`;ctx2.fill();
      ctx2.strokeStyle=`rgba(255,200,0,${al*0.8})`;ctx2.lineWidth=4;ctx2.stroke();
    }
    // 激怒時：赤いオーラ演出
    if(e.zEnraged){
      const auraR=e.r*(2.2+0.4*Math.sin(G.tick*.12));
      ctx2.beginPath();ctx2.arc(e.x,e.y,auraR,0,Math.PI*2);
      const enragedGrad=ctx2.createRadialGradient(e.x,e.y,e.r*.3,e.x,e.y,auraR);
      enragedGrad.addColorStop(0,`rgba(255,60,0,${0.28+0.12*Math.sin(G.tick*.09)})`);
      enragedGrad.addColorStop(0.6,'rgba(200,0,0,0.12)');
      enragedGrad.addColorStop(1,'rgba(100,0,0,0)');
      ctx2.fillStyle=enragedGrad;ctx2.fill();
    }
    drawZarcael(ctx2,e.x,e.y,e.r,e.zEnraged?'#ff2200':e.col,e.flash>0,e.zEnraged?2:1);
  }

  // バリア表示
  if(e.zBarrier>0){
    const bp=e.zBarrier/e.zBarrierMax;
    ctx2.strokeStyle=`rgba(80,180,255,${.4+.2*Math.sin(G.tick*.15)})`;
    ctx2.lineWidth=4+bp*4;
    ctx2.beginPath();ctx2.arc(e.x,e.y,e.r*1.5,0,Math.PI*2);ctx2.stroke();
    // バリアゲージ
    ctx2.fillStyle='rgba(0,0,0,.5)';ctx2.fillRect(cw/2-80,22,160,8);
    ctx2.fillStyle='#55aaff';ctx2.fillRect(cw/2-80,22,160*bp,8);
    ctx2.strokeStyle='#3388ff';ctx2.lineWidth=1;ctx2.strokeRect(cw/2-80,22,160,8);
    ctx2.fillStyle='#88ccff';ctx2.font='9px monospace';ctx2.textAlign='center';ctx2.fillText('🛡バリア',cw/2,18);
  }

  // HPバー
  const bw=e.r*3,bh=7,bx=e.x-e.r*1.5,by=e.y-e.r*2.5-16;
  ctx2.fillStyle='#21262d';ctx2.fillRect(bx,by,bw,bh);
  const hp=e.hp/e.maxHp;
  const hcol=hp>.6?'#3388ff':hp>.3?'#ffd700':'#f85149';
  ctx2.fillStyle=hcol;ctx2.fillRect(bx,by,bw*hp,bh);
  ctx2.font='bold 12px monospace';ctx2.textAlign='center';ctx2.textBaseline='middle';
  ctx2.fillStyle='#88ccff';ctx2.fillText('⚔ '+e.name,e.x,by-8);

  // 爆発
  b.explosions.forEach(ex=>{const al=ex.life/ex.maxLife;ctx2.fillStyle=`rgba(100,180,255,${al*.5})`;ctx2.beginPath();ctx2.arc(ex.x,ex.y,ex.r*(1.5-al*.5),0,Math.PI*2);ctx2.fill();});

  // ── プレイヤー軌跡描画（ザルカエル戦） ──
  if(G.trail.length>=2){
    const w=G.weapons[G.sel];
    const trailCol=G.abilities.includes('burn')?'#ff6600':G.abilities.includes('slow')?'#44aaff':w.col;
    ctx2.strokeStyle=trailCol;ctx2.lineWidth=getThick(w);ctx2.lineCap='round';ctx2.lineJoin='round';
    ctx2.globalAlpha=.80;ctx2.beginPath();ctx2.moveTo(G.trail[0].x,G.trail[0].y);
    for(let i=1;i<G.trail.length;i++)ctx2.lineTo(G.trail[i].x,G.trail[i].y);
    ctx2.stroke();
    ctx2.globalAlpha=.25;ctx2.lineWidth=getThick(w)*2.5;ctx2.beginPath();ctx2.moveTo(G.trail[0].x,G.trail[0].y);
    for(let i=1;i<G.trail.length;i++)ctx2.lineTo(G.trail[i].x,G.trail[i].y);
    ctx2.stroke();ctx2.globalAlpha=1;
  }
  // 囲み軌跡プレビュー
  const _w=G.weapons[G.sel];
  if(_w.ability==='circle'&&G.circleCt>0&&G.trail.length>=6&&trailClosed(G.trail)){
    ctx2.strokeStyle='rgba(200,136,255,.4)';ctx2.lineWidth=2;ctx2.setLineDash([4,4]);
    ctx2.beginPath();ctx2.moveTo(G.trail[0].x,G.trail[0].y);
    for(let i=1;i<G.trail.length;i++)ctx2.lineTo(G.trail[i].x,G.trail[i].y);
    ctx2.closePath();ctx2.stroke();ctx2.setLineDash([]);
  }

  // プレイヤー
  if(IMGS['player']){
    if(G.playerFlash>0)ctx2.globalAlpha=0.5;
    const sp=getCachedSprite('player',120);
    if(sp)ctx2.drawImage(sp,b.px-60,b.py-72,120,144);
    else ctx2.drawImage(IMGS['player'],b.px-60,b.py-72,120,144);
    if(G.playerFlash>0)ctx2.globalAlpha=1;
  } else drawStick(ctx2,b.px,b.py,26,G.cd===0,G.playerFlash>0);

  // CT円
  if(G.cd>0){ctx2.strokeStyle='#88ccff';ctx2.lineWidth=3;ctx2.beginPath();ctx2.arc(b.px,b.py,32,Math.PI*-.5,Math.PI*-.5+Math.PI*2*(1-G.cd/G.cdMax));ctx2.stroke();}

  // ダメージ数字
  b.dnums.forEach(d=>{ctx2.fillStyle=`rgba(${d.big?'150,220,255':'200,230,255'},${d.life/45})`;ctx2.font=`bold ${d.big?20:13}px monospace`;ctx2.textAlign='center';ctx2.textBaseline='middle';ctx2.fillText(d.text,d.x,d.y);});

  // 射程円
  ctx2.strokeStyle=G.cd===0?'rgba(80,200,80,.2)':'rgba(80,80,80,.15)';ctx2.lineWidth=1.5;ctx2.setLineDash([3,3]);ctx2.beginPath();ctx2.arc(b.px,b.py,getRange(),0,Math.PI*2);ctx2.stroke();ctx2.setLineDash([]);

  // ビーム
  if(G.beamActive){const bm=G.beamActive;const prog=bm.life/bm.maxLife;ctx2.save();ctx2.globalAlpha=prog*.9;ctx2.strokeStyle='rgba(100,200,255,0.4)';ctx2.lineWidth=18;ctx2.lineCap='round';ctx2.shadowColor='#3388ff';ctx2.shadowBlur=20;ctx2.beginPath();ctx2.moveTo(bm.sx,bm.sy);ctx2.lineTo(bm.tx,bm.ty);ctx2.stroke();ctx2.strokeStyle='#aaddff';ctx2.lineWidth=4;ctx2.shadowBlur=10;ctx2.beginPath();ctx2.moveTo(bm.sx,bm.sy);ctx2.lineTo(bm.tx,bm.ty);ctx2.stroke();ctx2.restore();}
}

function endZarkaelBattle(){
  stopBGM();
  G.phase='won';
  G.battle=null;G.trail=[];G.drawing=false;
  const ng=G.ng||1;
  G.gold+=10000;
  sndPenta();
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h2 style="color:#88ccff;font-size:20px;text-shadow:0 0 20px #3388ff">— 堕天使、討滅 —</h2>
    <p style="color:#aaddff;font-size:13px;line-height:2">ザルカエルの魂が砕け散った…<br>真なる英雄よ、天は汝を認めた</p>
    <p style="color:#ffd700;font-size:14px">🏆 ${ng}周目 完全制覇！<br>Lv.${G.lv} / 💰${G.gold}G</p>
    <button onclick="startNG()" style="background:linear-gradient(135deg,#1a002f,#2a0050);border:2px solid #cc44ff;color:#cc44ff;padding:10px 20px;box-shadow:0 0 14px #9900ff88">⚔ ${ng+1}周目へ</button>
    <button onclick="startGame()" style="border-color:#ffd700;color:#ffd700">🔄 最初から</button>`;
  ov.style.display='flex';
}
function ptLineDist(p,a,b){const dx=b.x-a.x,dy=b.y-a.y;if(!dx&&!dy)return Math.hypot(p.x-a.x,p.y-a.y);const t=Math.max(0,Math.min(1,((p.x-a.x)*dx+(p.y-a.y)*dy)/(dx*dx+dy*dy)));return Math.hypot(p.x-a.x-t*dx,p.y-a.y-t*dy);}
function endBattle(win){stopBGM();if(win){const isBoss=G.battle.isBoss;if(isBoss){G.bossDefeated=true;log('👑 ボス撃破！','lb');for(const k in G.meta){if(G.meta[k].locked)G.meta[k].locked=false;}
  if((G.area===1||G.area===2)&&G.floor%10===0){G.bossBonusPending=(G.bossBonusPending||0)+1;log('🎁 ボス撃破ボーナス：特殊能力強化+1！','le');}
  // 2周目 冥界の覇王(フェーズ3)撃破 → 階段の封印を解くがザルカエルはまだ出ない
  if((G.ng||1)>=2&&G.area===3&&G.battle&&G.battle.finalPhase===3){
    G.phase='map';G.battle=null;G.trail=[];G.drawing=false;
    G.zarkaelReady=true; // 階段を踏んだらザルカエル登場
    updatePhase();startBGM('map');
    log('👁 何かが封印から解き放たれた…','lb');
    showCombo('封印が解けた…！');
    // 不気味なSE
    for(let i=0;i<5;i++) tone(110-i*8,'sawtooth',.10,AC.currentTime+i*.25,.4);
    return;
  }
}G.phase='map';G.battle=null;G.trail=[];G.drawing=false;log('✨ 勝利！','le');updatePhase();startBGM('map');}else die();}

// ══ TRAIL / ATTACK ══
canvas.addEventListener('mousedown',e=>{if(e.button!==0||G.phase!=='battle'||G.cd>0||G.paused)return;AC.resume();const r=canvas.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;if(!G.battle.isMermaid&&Math.hypot(mx-G.battle.px,my-G.battle.py)>getRange())return;G.drawing=true;G.trail=[];G.trail.push({x:mx,y:my});});
canvas.addEventListener('mousemove',e=>{if(!G.drawing||G.phase!=='battle'||G.paused)return;const r=canvas.getBoundingClientRect();G.trail.push({x:e.clientX-r.left,y:e.clientY-r.top});const w=G.weapons[G.sel];let len=0;for(let i=1;i<G.trail.length;i++){const dx=G.trail[i].x-G.trail[i-1].x,dy=G.trail[i].y-G.trail[i-1].y;len+=Math.sqrt(dx*dx+dy*dy);}if(len>getTrail(w)){G.drawing=false;doAttack();}});
canvas.addEventListener('mouseup',()=>{if(G.drawing&&G.phase==='battle'&&!G.paused){G.drawing=false;doAttack();}});
canvas.addEventListener('mouseleave',()=>{if(G.drawing&&G.phase==='battle'){G.drawing=false;doAttack();}});

function ptSeg(p,a,b){const dx=b.x-a.x,dy=b.y-a.y;if(!dx&&!dy)return Math.hypot(p.x-a.x,p.y-a.y);const t=Math.max(0,Math.min(1,((p.x-a.x)*dx+(p.y-a.y)*dy)/(dx*dx+dy*dy)));return Math.hypot(p.x-a.x-t*dx,p.y-a.y-t*dy);}
function trailLenF(tr){let l=0;for(let i=1;i<tr.length;i++){const dx=tr[i].x-tr[i-1].x,dy=tr[i].y-tr[i-1].y;l+=Math.sqrt(dx*dx+dy*dy);}return l;}
function trailClosed(tr){if(tr.length<8)return false;const s=tr[0],e=tr[tr.length-1];return Math.hypot(s.x-e.x,s.y-e.y)<55&&trailLenF(tr)>80;}
function pointInPoly(px,py,poly){let inside=false;for(let i=0,j=poly.length-1;i<poly.length;j=i++){const xi=poly[i].x,yi=poly[i].y,xj=poly[j].x,yj=poly[j].y;if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi))inside=!inside;}return inside;}
const CNAMES=['','Double!!','Triple!!!','Quad!!!!','PENTA!!!!!'];
function doAttack(){
  if(G.trail.length<2){G.trail=[];return;}
  const b=G.battle;if(!b){G.trail=[];return;}
  // Mermaid戦は専用処理
  if(b.isMermaid){doAttackMermaid(b);return;}
  const w=G.weapons[G.sel];let hit=[];let circleHit=false;
  if(w.ability==='circle'&&G.circleCt>0&&trailClosed(G.trail)){b.enemies.forEach(e=>{if(pointInPoly(e.x,e.y,G.trail)&&!hit.includes(e))hit.push(e);});if(hit.length>0){circleHit=true;G.circleCt--;sndCircle();showSub('✦ 囲み！残り'+G.circleCt);}}
  b.enemies.forEach(e=>{for(let i=1;i<G.trail.length;i++){if(ptSeg({x:e.x,y:e.y},G.trail[i-1],G.trail[i])<e.r+getThick(w)*.55){if(!hit.includes(e))hit.push(e);break;}}});
  if(hit.length>0){
    const ba=G.atk+getAtk(w);let goldGain=0;
    const hasBurn=G.abilities.includes('burn'),hasSlow=G.abilities.includes('slow'),hasDbl=G.abilities.includes('doublehit'),hasVamp=G.abilities.includes('vampire'),hasExp=G.abilities.includes('explode');
    const expMul=(G.abilities.includes('expbonus')?(1.1+(G.abilityLv.expbonus||0)*.1):1)*(1+getSetBonusXPmul());
    const goldMul=(G.abilities.includes("goldbonus")?(1.1+(G.abilityLv.goldbonus||0)*.1):1)*(1+getSetBonusGoldMul());
    // クリティカル率（二連撃 + セットボーナス）
    const baseCritRate=hasDbl?(.3+(G.abilityLv.doublehit||0)*.15):0;
    const setBonusCritRate=getSetBonusCritRate(w);
    const totalCritRate=baseCritRate+setBonusCritRate;
    // 100%超過分はクリティカルダメージ倍率に換算（超過10%ごとに+10%クリダメ）
    const overCrit=Math.max(0,totalCritRate-1.0);
    const critMulBonus=overCrit*1.0+getSetBonusCritMul(w); // 超過分1倍+セットボーナス
    const effectiveCritRate=Math.min(1.0,totalCritRate);
    hit.forEach(e=>{
      // 台詞中は無敵
      if(e.zEnragedDialogue){b.dnums.push({x:e.x,y:e.y-e.r-8,text:'無敵',life:25,big:false});return;}
      let d=rnd(Math.round(ba*.85),Math.round(ba*1.2));
      // クリティカル判定
      let isCrit=false;
      if((hasDbl||setBonusCritRate>0)&&Math.random()<effectiveCritRate){
        d=Math.round(d*(2+critMulBonus));
        isCrit=true;
      }
      // バリア処理（ザルカエル用）
      if(e.zBarrier>0){
        const absorbed=Math.min(d,e.zBarrier);
        e.zBarrier-=absorbed;
        b.dnums.push({x:e.x+(Math.random()-.5)*28,y:e.y-e.r-22,text:'🛡BLOCK',life:30,big:false});
        d-=absorbed;
        if(d<=0){if(hasVamp&&absorbed>0){const rate=.01+(G.abilityLv.vampire||0)*.01;G.hp=Math.min(G.maxHp,G.hp+Math.max(1,Math.round(absorbed*rate)));}return;}
      }
      e.hp-=d;e.flash=15;
      if(hasBurn)e.burnTimer=180+(G.abilityLv.burn||0)*60;
      if(hasSlow)e.slowTimer=60+(G.abilityLv.slow||0)*30;
      // クリティカルエフェクト
      if(isCrit){
        b.dnums.push({x:e.x+(Math.random()-.5)*28,y:e.y-e.r-8,text:'⚡CRIT! -'+d,life:50,big:true,crit:true});
        b.explosions.push({x:e.x,y:e.y,r:30,life:12,maxLife:12,col:'#ffdd00'});
        tone(880,'square',.06,AC.currentTime,.04);tone(1320,'square',.04,AC.currentTime+.04,.04);
      } else {
        b.dnums.push({x:e.x+(Math.random()-.5)*28,y:e.y-e.r-8,text:'-'+d,life:40,big:false});
      }
      if(hasVamp){const rate=.01+(G.abilityLv.vampire||0)*.01;G.hp=Math.min(G.maxHp,G.hp+Math.max(1,Math.round(d*rate)));}
      if(e.hp<=0){const xpGain=Math.round(e.xp*expMul);G.xp+=xpGain;goldGain+=Math.round(e.gold*goldMul);log('💀 '+e.name,'c');}
    });
    if(hasExp&&G.trail.length>0){const last=G.trail[G.trail.length-1];const expR=50+(G.abilityLv.explode||0)*15;const expDmgMul=1+(G.abilityLv.explode||0)*.2;b.explosions.push({x:last.x,y:last.y,r:expR,life:25,maxLife:25});b.enemies.filter(e=>Math.hypot(e.x-last.x,e.y-last.y)<expR).forEach(e=>{if(!hit.includes(e)&&!e.rare){const d=Math.round(ba*.5*expDmgMul);e.hp-=d;e.flash=10;b.dnums.push({x:e.x,y:e.y-e.r,text:'-'+d,life:30,big:false});}});}
    const dead=hit.filter(e=>e.hp<=0).length;if(dead>=2)goldGain=Math.round(goldGain*1.5);if(dead>=4)goldGain=Math.round(goldGain*2);
    const bokireW=G.weapons.find(w=>w.isBokire&&!w.isUR);
    if(bokireW){const kills=hit.filter(e=>e.hp<=0&&!e.rare).length;if(kills>0){G.bokireKills=(G.bokireKills||0)+kills;renderWList();if(G.bokireKills>=200&&G.mermaidDefeated)evolveBokire(bokireW);}}
    G.gold+=goldGain;b.enemies=b.enemies.filter(e=>e.hp>0);if(!b.enemies.some(e=>e.rare))b.hasRare=false;
    // ザルカエル戦: HPが0になったら即終了
    if(b.isZarcael&&b.enemies.length===0){lvUp();endZarkaelBattle();return;}
    // ザルカエル激怒チェック（軌跡ダメージでHP3割以下になった場合）
    if(b.isZarcael&&b.enemies.length>0){const ez=b.enemies[0];if(!ez.zEnraged&&ez.hp/ez.maxHp<0.3){/* updateで処理 */}}
    lvUp();
    const n=hit.length;
    if(n>=5){sndPenta();G.gold+=200;showCombo('PENTAKILL!!');b.dnums.push({x:cw/2,y:80,text:'+200G PENTAKILL!!',life:60,big:true});}
    else if(n>=2){sndHit(n);showCombo(CNAMES[n-1]);}
    else sndHit(1);
    if(w.special==='twin'){if(!G.twinFirstHit){G.twinFirstHit=true;G.cd=Math.round(calcCT(w)*.3);}else{G.twinFirstHit=false;G.cd=circleHit?0:G.cdMax;}}
    else{G.cd=circleHit?0:G.cdMax;}
    setTimeout(()=>{G.trail=[];},380);
    const nonRare=b.enemies.filter(e=>!e.rare);
    if(!b.isBoss&&nonRare.length===0)endBattle(true);
  } else {G.trail=[];if(w.special==='twin')G.twinFirstHit=false;}
  updateUI();
}

// ══ UI ══
function updateUI(){
  document.getElementById('hp-text').textContent=G.hp+'/'+G.maxHp;document.getElementById('hp-fill').style.width=(G.hp/G.maxHp*100)+'%';
  document.getElementById('xp-text').textContent=G.xp+'/'+G.xpNext;document.getElementById('xp-fill').style.width=(G.xp/G.xpNext*100)+'%';
  document.getElementById('lv-t').textContent=G.lv;document.getElementById('atk-t').textContent=G.atk+G.upgAtk*8;
  document.getElementById('fl-t').textContent=G.area+'面'+G.floor+'F';
  document.getElementById('cd-fill').style.width=(G.cd/G.cdMax*100)+'%';document.getElementById('cd-t').textContent=G.cd===0?'OK':(G.cd/60).toFixed(1)+'s';
  document.getElementById('gold-disp').textContent=G.gold+'G';document.getElementById('circle-ct').textContent=G.circleCt+'/3';
}
function updatePhase(){
  if(G.phase==='map'&&(G.bossBonusPending||0)>0)setTimeout(drainBossBonus,400);
  const b=document.getElementById('phase-badge');const isB=G.battle&&G.battle.isBoss;const isF=G.battle&&G.battle.finalPhase>=2;
  if(G.phase==='map'){b.textContent='マップ';b.className='pm';}
  else if(isF){b.textContent=G.battle.finalPhase===3?'🌑冥界戦':'⚡復活戦';b.className='pbo2';}
  else if(isB){b.textContent='👑ボス戦';b.className='pbo';}
  else{b.textContent='戦闘中';b.className='pb';}
  document.getElementById('hint').textContent=G.phase==='map'?'WASD:移動 | 霧を晴らして探索':'WASD:移動 | 射程内からドラッグ攻撃';
}
function showCombo(t){const el=document.getElementById('combo-disp');el.textContent=t;el.style.opacity=1;clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity=0,1600);}
function showSub(t){const el=document.getElementById('sub-disp');el.textContent=t;el.style.opacity=1;clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity=0,1300);}
function die(){
  G.phase='dead';stopBGM();sndGameOver();
  const ng=G.ng||1;
  if(ng>=3){
    // 3周目以降：名前入力→ランキング登録
    showRankingEntry();
  } else {
    showOv('☠ ゲームオーバー',G.area+'面'+G.floor+'F / Lv.'+G.lv+' / 💰'+G.gold+'G',false);
  }
}
function showOv(t,d,win){const ov=document.getElementById('overlay');ov.innerHTML=`<h2 style="color:${win?'#ffd700':'#f85149'}">${t}</h2><p>${d}</p><button onclick="startGame()">もう一度</button>`;ov.style.display='flex';}
function log(msg,t='lm'){const d=document.getElementById('log'),el=document.createElement('div');el.className=t==='c'?'lc':t==='li'?'li':t==='le'?'le':t==='lb'?'lb':'lm';el.textContent=msg;d.appendChild(el);while(d.children.length>80)d.removeChild(d.firstChild);d.scrollTop=d.scrollHeight;}

function showAbOv(id){
  const a=ALL_ABILITIES.find(x=>x.id===id);if(!a)return;
  const lv=G.abilityLv[id]||0;
  document.getElementById('ab-ov-name').textContent=a.name+' Lv'+(lv+1);
  let body=`<span style="color:#3fb950">● 効果</span>: ${a.lv1}`;
  if(lv>0)body+=`<br><span style="color:#e3b341">● 強化済×${lv}</span>: ${a.upgrade}`;
  body+=`<br><span style="color:#8b949e">● 次の強化</span>: ${a.upgrade}`;
  document.getElementById('ab-ov-body').innerHTML=body;
  document.getElementById('ab-overlay').style.display='block';
}
function hideAbOv(){document.getElementById('ab-overlay').style.display='none';}
function loop(){
  requestAnimationFrame(loop);
  if(!G)return;
  if(G.phase==='battle'&&!G.paused){
    if(G.battle&&G.battle.isZarcael) updateZarcaelBattle(G.battle);
    else if(G.battle&&G.battle.isMermaid) updateMermaidBattle(G.battle);
    else updateBattle();
  }
  if(G.phase==='map')drawMap();
  else if(G.phase==='battle'&&G.battle){
    if(G.battle.isZarcael) drawZarkaelBattle(G.battle);
    else if(G.battle.isMermaid) drawMermaidBattle(G.battle);
    else drawBattle();
  }
  updateUI();
}
// NG+: キャラ引継ぎで2週目開始
window.startNG=function(){
  document.getElementById('overlay').style.display='none';
  const ng=(G.ng||1)+1;
  // 現在のキャラデータを引継ぎ
  const carry={
    hp:G.maxHp, maxHp:G.maxHp, xp:0, xpNext:G.xpNext,
    lv:G.lv, atk:G.atk, gold:G.gold,
    weapons:G.weapons, sel:G.sel,
    upgAtk:G.upgAtk, upgCT:G.upgCT, upgTrail:G.upgTrail,
    upgThick:G.upgThick, upgRange:G.upgRange,
    abilities:G.abilities, abilityLv:G.abilityLv,
    abilityCap:G.abilityCap,
    bokireKills:G.bokireKills,
    shieldCDMax:G.shieldCDMax, ghostDur:G.ghostDur, ghostCDMax:G.ghostCDMax,
    arrowInterval:G.arrowInterval, beamCDMax:G.beamCDMax,
  };
  resize();
  G=initG();
  // 引継ぎ上書き
  Object.assign(G, carry);
  G.ng=ng;
  G.hp=G.maxHp;
  G.shieldTimer=G.abilities.includes('shield')?1800:0;
  G.cdMax=calcCT(G.weapons[G.sel]);
  genFloor();
  renderWList();updatePhase();updateEqInfo();AC.resume();startBGM('map');
  log(`🔥 ${ng}周目開始！敵が強化されている…`,'lb');
};

function startGame(){
  document.getElementById('overlay').style.display='none';
  resize();G=initG();genFloor();G.cdMax=calcCT(G.weapons[0]);
  renderWList();updatePhase();updateEqInfo();AC.resume();startBGM('map');log('1面：森の迷宮へ！','le');
}
window.addEventListener('resize',resize);resize();requestAnimationFrame(loop);
